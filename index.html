<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart Irrigation</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

html,
body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#fff;
}

.app{
    width:100%;
    height:100vh;
    position:relative;
    overflow:hidden;
}

/* ================= COMMON PAGE ================= */

.page{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    transition:1s ease;
}

/* ================================================= */
/* SPLASH SCREEN */
/* ================================================= */

.splash-screen{
    background:#F6F4D9;
    z-index:10;
    overflow:hidden;
}

/* TEXT */

.splash-content{
    position:absolute;
    top:18%;
    left:8%;
    z-index:2;
}

.splash-title{
    font-size:clamp(42px,6vw,78px);
    font-weight:800;
    color:#20743D;
    line-height:1.05;
    letter-spacing:-2px;
}

.splash-subtitle{
    margin-top:12px;
    color:#7D7D7D;
    font-size:clamp(15px,1.6vw,21px);
    line-height:1.5;
}

/* BACKGROUND IMAGE */

.splash-bg{
    width:100%;
    height:100vh;
    position:absolute;
    inset:0;
    background-image:url('greenhouse.png');
    background-size:cover;
    background-position:bottom center;
    background-repeat:no-repeat;
}

/* ================================================= */
/* LOGIN SCREEN */
/* ================================================= */

.login-screen{
    background:#FFFFFF;
    opacity:0;
    visibility:hidden;
    overflow:hidden;
}

.login-screen.active{
    opacity:1;
    visibility:visible;
}

/* LOGIN BACKGROUND IMAGE */

.login-bg{
    width:100%;
    height:100vh;
    position:absolute;
    inset:0;
    background-image:url('Firefly_Gemini Flash_An IoT agricultural device installed in a farm setting- soil moisture probes in the g 243046.png');
    background-size:cover;
    background-position:bottom center;
    background-repeat:no-repeat;
    z-index:1;
}

/* CONTENT */

.login-content{
    position:relative;
    z-index:2;
    width:100%;
    max-width:540px;
    padding:50px 34px;
}

/* TITLES */

.login-title{
    margin-top:30px;
    font-size:clamp(40px,5vw,70px);
    font-weight:800;
    color:#111329;
    line-height:1.05;
    letter-spacing:-2px;
}

.login-subtitle{
    margin-top:12px;
    color:#8A8A8A;
    font-size:clamp(15px,1.5vw,20px);
}

/* FORM */

.form-group{
    margin-top:36px;
}

.label{
    margin-bottom:14px;
    font-size:22px;
    font-weight:700;
    color:#111329;
}

.input-box{
    width:100%;
    height:78px;
    background:#F8FAF8;
    border:2px solid #E9ECE9;
    border-radius:22px;
    display:flex;
    align-items:center;
    padding:0 22px;
    position:relative;
}

.input-box i{
    font-size:24px;
    color:#7D7D7D;
}

.input-box input{
    width:100%;
    height:100%;
    border:none;
    outline:none;
    background:transparent;
    padding-left:15px;
    font-size:18px;
    font-weight:500;
    color:#222;
}

.input-box input::placeholder{
    color:#808080;
    font-weight:400;
}

.eye{
    position:absolute;
    right:22px;
    cursor:pointer;
}

/* BUTTON */

.signin-btn{
    width:100%;
    height:74px;
    margin-top:55px;
    border:none;
    border-radius:24px;
    background:#2B7A3E;
    color:#fff;
    font-size:22px;
    font-weight:500;
    cursor:pointer;
    box-shadow:0 10px 25px rgba(43,122,62,0.18);
}

.signin-btn:active{
    transform:scale(0.98);
}

/* ================================================= */
/* RESPONSIVE */
/* ================================================= */

@media (max-width:768px){

    .splash-content{
        top:14%;
        left:7%;
    }

    .login-content{
        padding:35px 24px;
    }

    .label{
        font-size:18px;
    }

    .input-box{
        height:70px;
    }

    .signin-btn{
        height:70px;
        font-size:20px;
    }

    /* IMAGE RESPONSIVE */

    .splash-bg,
    .login-bg{
        background-size:contain;
        background-position:bottom center;
    }

}

@media (max-width:480px){

    .splash-content{
        top:13%;
    }

    .login-title,
    .splash-title{
        letter-spacing:-1px;
    }

    .input-box{
        border-radius:20px;
    }

    .signin-btn{
        border-radius:20px;
    }

    .splash-bg,
    .login-bg{
        background-size:100% auto;
        background-position:bottom center;
    }

}

</style>
</head>

<body>

<div class="app">

    <!-- SPLASH SCREEN -->

    <section class="page splash-screen" id="splash">

        <div class="splash-content">

            <h1 class="splash-title">
                Smart Irrigation
            </h1>

            <p class="splash-subtitle">
                Real time status of all your Irrigation Device
            </p>

        </div>

        <div class="splash-bg"></div>

    </section>

    <!-- LOGIN SCREEN -->

    <section class="page login-screen" id="login">

        <div class="login-bg"></div>

        <div class="login-content">

            <h1 class="login-title">
                Login Account
            </h1>

            <p class="login-subtitle">
                Please login with registered account
            </p>

            <!-- EMAIL -->

            <div class="form-group">

                <div class="label">
                    Email or Phone Number
                </div>

                <div class="input-box">

                    <i class="fa-regular fa-envelope"></i>

                    <input type="text"
                    placeholder="Enter your email">

                </div>

            </div>

            <!-- PASSWORD -->

            <div class="form-group">

                <div class="label">
                    Password
                </div>

                <div class="input-box">

                    <i class="fa-solid fa-lock"></i>

                    <input type="password"
                    id="password"
                    placeholder="Enter your password">

                    <i class="fa-regular fa-eye eye"
                    id="toggle"></i>

                </div>

            </div>

            <button class="signin-btn">
                Sign In
            </button>

        </div>

    </section>

</div>

<script>

/* SPLASH TO LOGIN */

const splash = document.getElementById("splash");
const login = document.getElementById("login");

setTimeout(() => {

    splash.style.opacity = "0";
    splash.style.pointerEvents = "none";

    login.classList.add("active");

}, 3000);

/* PASSWORD TOGGLE */

const toggle = document.getElementById("toggle");
const password = document.getElementById("password");

toggle.addEventListener("click", () => {

    if(password.type === "password"){

        password.type = "text";

        toggle.classList.replace("fa-eye","fa-eye-slash");

    }else{

        password.type = "password";

        toggle.classList.replace("fa-eye-slash","fa-eye");

    }

});

</script>

</body>
</html>

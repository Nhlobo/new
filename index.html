<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WaterWise Smart Farming OS</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root { --bg:#111315; --panel:#1a1d21; --panel2:#20242a; --text:#e8eaed; --muted:#9ca3af; --ok:#22c55e; --warn:#f59e0b; --bad:#ef4444; --line:#30343b; }
    .light { --bg:#f3f4f6; --panel:#fff; --panel2:#f8fafc; --text:#111827; --muted:#6b7280; --line:#e5e7eb; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:Inter,system-ui,-apple-system,sans-serif; background:var(--bg); color:var(--text); }
    .app { display:flex; min-height:100vh; }
    .sidebar { width:230px; background:var(--panel); border-right:1px solid var(--line); padding:16px; position:sticky; top:0; height:100vh; overflow:auto; }
    .brand { font-weight:700; margin-bottom:14px; }
    .nav-btn { display:block; width:100%; padding:10px; margin-bottom:6px; border:1px solid var(--line); border-radius:8px; background:transparent; color:var(--text); text-align:left; cursor:pointer; }
    .nav-btn.active,.nav-btn:hover{ background:var(--panel2); }
    main { flex:1; padding:16px; }
    .screen { display:none; animation:fade .2s ease; }
    .screen.active { display:block; }
    @keyframes fade { from{opacity:.6; transform:translateY(2px)} to{opacity:1; transform:none} }
    .top { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; gap:12px; }
    .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(190px,1fr)); gap:12px; }
    .card { background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:12px; }
    .title { font-size:12px; color:var(--muted); margin-bottom:6px; }
    .value { font-size:22px; font-weight:700; }
    .row { display:flex; gap:10px; flex-wrap:wrap; }
    button, input, select { background:var(--panel2); color:var(--text); border:1px solid var(--line); border-radius:8px; padding:8px 10px; }
    button { cursor:pointer; }
    .ok{color:var(--ok)} .warn{color:var(--warn)} .bad{color:var(--bad)} .muted{color:var(--muted)}
    .list{display:grid; gap:8px}
    .item{display:flex; justify-content:space-between; align-items:center; border:1px solid var(--line); border-radius:8px; padding:8px; background:var(--panel2)}
    .toast-wrap{position:fixed; right:14px; bottom:14px; display:grid; gap:8px; z-index:9999}
    .toast{background:var(--panel); border:1px solid var(--line); padding:10px; border-left:4px solid var(--ok); border-radius:8px; min-width:220px}
    .auth,.splash{display:grid; place-items:center; min-height:100vh}
    .auth .card,.splash .card{max-width:360px;width:100%}
    .hide{display:none!important}
    canvas{max-height:260px}
  </style>
</head>
<body>
  <section id="splash" class="splash"><div class="card"><h2>WaterWise</h2><p class="muted">Smart Farming OS booting...</p></div></section>

  <section id="login" class="auth hide">
    <div class="card">
      <h2>Login</h2>
      <div class="list">
        <input id="user" placeholder="Farmer name" value="Ravi Patel" />
        <input id="farm" placeholder="Farm name" value="GreenField Farm" />
        <button id="loginBtn">Enter Dashboard</button>
      </div>
    </div>
  </section>

  <div id="app" class="app hide">
    <aside class="sidebar">
      <div class="brand">🌱 WaterWise</div>
      <div id="nav"></div>
    </aside>
    <main>
      <div id="dashboard" class="screen active"></div>
      <div id="control" class="screen"></div>
      <div id="sensors" class="screen"></div>
      <div id="weather" class="screen"></div>
      <div id="analytics" class="screen"></div>
      <div id="notifications" class="screen"></div>
      <div id="health" class="screen"></div>
      <div id="settings" class="screen"></div>
      <div id="profile" class="screen"></div>
      <div id="lab" class="screen"></div>
      <div id="devices" class="screen"></div>
    </main>
  </div>

  <div id="toasts" class="toast-wrap"></div>

<script>
const screens=[['dashboard','Main Dashboard'],['control','Pump & Valve Control'],['sensors','Sensor Monitoring'],['weather','Weather'],['analytics','Analytics / History'],['notifications','Notifications Center'],['health','System Health'],['settings','Settings'],['profile','Profile'],['lab','Simulation Lab'],['devices','Device Manager']];
const state={
  logged:false, dark:true, notify:true, auto:true, speed:1,
  weather:'Sunny', online:true, rain:false, storm:false,
  soil:62, tank:78, temp:29, flow:0, battery:73, solarIn:31,
  pump:false, valve:false, leak:false, pumpFail:false, sensorFail:false,
  pumpRuntime:0, waterUsed:0, uptime:0, wifi:86,
  history:{t:[],soil:[],temp:[],battery:[],water:[],runtime:[]}, notes:[],
  profile:{farmer:'Ravi Patel',farm:'GreenField Farm',size:'12 acres'}
};
const devices=['ESP32 Controller','Soil Sensor','Tank Sensor','Flow Sensor','Pump Relay','Valve Controller'];
let charts={};

const addNote=(msg,type='ok')=>{const t=new Date().toLocaleTimeString(); state.notes.unshift({msg,t,type}); if(state.notify){const d=document.createElement('div'); d.className='toast'; d.style.borderLeftColor= type==='bad'?'var(--bad)':type==='warn'?'var(--warn)':'var(--ok)'; d.innerHTML=`<b>${msg}</b><div class='muted'>${t}</div>`;toasts.appendChild(d);setTimeout(()=>d.remove(),3800);} };
const statusClass=v=>v?'ok':'bad';
const pct=v=>Math.max(0,Math.min(100,v));

function renderNav(){nav.innerHTML=screens.map(([id,n],i)=>`<button class='nav-btn ${i===0?'active':''}' data-id='${id}'>${n}</button>`).join('');
nav.querySelectorAll('button').forEach(b=>b.onclick=()=>{document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.querySelectorAll('.nav-btn').forEach(x=>x.classList.remove('active'));document.getElementById(b.dataset.id).classList.add('active');b.classList.add('active');if(b.dataset.id==='analytics'&&!charts.soil)buildCharts();render();});}

function controlPump(on,reason='Manual'){ if(state.pumpFail && on){addNote('Pump failure: cannot start','bad');return;} state.pump=on; if(!on) state.flow=0; addNote(`Pump ${on?'started':'stopped'} (${reason})`,on?'ok':'warn'); }
function controlValve(on){ state.valve=on; addNote(`Valve ${on?'opened':'closed'}`,on?'ok':'warn'); }
function shutdown(){state.pump=false;state.valve=false;state.flow=0;addNote('Emergency shutdown activated','bad');}

function autoLogic(){
  const shouldIrrigate=state.auto && state.soil<38 && state.tank>18 && !state.rain && !state.leak && !state.pumpFail && state.online;
  const mustStop=state.rain || state.tank<10 || state.pumpFail || state.leak || !state.online;
  if(shouldIrrigate && (!state.pump || !state.valve)){ controlPump(true,'Auto'); controlValve(true); }
  if(mustStop && (state.pump||state.valve)){ controlPump(false,'Auto safety'); controlValve(false); addNote('Auto safety stop triggered','bad'); }
}

function simulate(){
  const k=state.speed;
  state.uptime+=1*k;
  if(state.weather==='Rain'){ state.rain=true; state.soil+=0.9*k; }
  else if(state.weather==='Storm'){ state.rain=true; state.storm=true; state.soil+=1.4*k; }
  else { state.rain=false; state.storm=false; state.soil-=0.22*k; }
  if(state.weather==='Sunny') state.temp+= (Math.random()-.35)*0.5*k; else state.temp+= (Math.random()-.55)*0.4*k;
  if(state.pump && state.valve){ state.flow=12+Math.random()*4; state.tank-=0.45*k; state.soil+=0.55*k; state.pumpRuntime+=1*k; state.waterUsed+=state.flow/60; }
  else state.flow=Math.max(0,state.flow-3*k);
  let solarBase=state.weather==='Sunny'?35:state.weather==='Cloudy'?19:8;
  state.solarIn=solarBase+Math.random()*6;
  state.battery += (state.solarIn/140 - (state.pump?0.34:0.1))*k;
  state.soil=pct(state.soil); state.tank=pct(state.tank); state.battery=pct(state.battery); state.temp=Math.max(10,Math.min(50,state.temp));
  if(state.leak){ state.tank-=0.8*k; state.flow+=6; }
  if(state.tank<15) addNote('Low tank level','warn');
  if(state.battery<20) addNote('Battery low','warn');
  autoLogic();
  randomEvents();
  pushHistory();
  render();
}

function randomEvents(){
  if(Math.random()<0.003){ state.weather=['Sunny','Cloudy','Rain','Storm'][Math.floor(Math.random()*4)]; if(state.weather.includes('Rain')||state.weather==='Storm') addNote('Rain detected','warn'); }
}

function pushHistory(){
  const t=new Date().toLocaleTimeString();
  ['t','soil','temp','battery','water','runtime'].forEach((k,i)=>{if(i===0) state.history.t.push(t);});
  state.history.soil.push(state.soil); state.history.temp.push(state.temp); state.history.battery.push(state.battery); state.history.water.push(state.waterUsed); state.history.runtime.push(state.pumpRuntime);
  if(state.history.t.length>40){Object.keys(state.history).forEach(k=>state.history[k].shift());}
  if(charts.soil){ ['soil','temp','battery','water','runtime'].forEach(k=>{charts[k].data.labels=state.history.t; charts[k].data.datasets[0].data=state.history[k]; charts[k].update('none');}); }
}

function buildCharts(){
  ['soil','water','runtime','temp','battery'].forEach(id=>{
    const ctx=document.getElementById(id+'Chart').getContext('2d');
    charts[id]=new Chart(ctx,{type:'line',data:{labels:state.history.t,datasets:[{data:state.history[id],borderColor:'#22c55e',pointRadius:0,tension:.25}]},options:{plugins:{legend:{display:false}},scales:{x:{display:false},y:{ticks:{color:'#9ca3af'},grid:{color:'#30343b'}}}}});
  });
}

function render(){
  document.body.classList.toggle('light',!state.dark);
  dashboard.innerHTML=`<div class='top'><h2>Main Dashboard</h2><div class='muted'>System ${state.online?'Online':'Offline'} | ${state.weather}</div></div><div class='grid'>
  ${card('Soil Moisture',state.soil.toFixed(1)+'%')}${card('Tank Level',state.tank.toFixed(1)+'%')}${card('Water Flow',state.flow.toFixed(1)+' L/min')}${card('Temperature',state.temp.toFixed(1)+'°C')}${card('Battery',state.battery.toFixed(1)+'%')}${card('Solar Input',state.solarIn.toFixed(1)+' W')}
  ${card('Pump Status',state.pump?'<span class=ok>Running</span>':'<span class=bad>Stopped</span>')}${card('Valve Status',state.valve?'<span class=ok>Open</span>':'<span class=bad>Closed</span>')}${card('Internet',state.online?'<span class=ok>Connected</span>':'<span class=bad>Disconnected</span>')}${card('System Status',healthStatus())}</div>`;

  control.innerHTML=`<div class='top'><h2>Control Center</h2></div><div class='row'>
  <button onclick="controlPump(true)">Start Pump</button><button onclick="controlPump(false)">Stop Pump</button><button onclick="controlValve(true)">Open Valve</button><button onclick="controlValve(false)">Close Valve</button><button onclick="state.auto=true;addNote('Auto mode enabled')">Enable Auto Mode</button><button onclick="state.auto=false;addNote('Auto mode disabled','warn')">Disable Auto Mode</button><button onclick="shutdown()">Emergency Shutdown</button></div>`;

  sensors.innerHTML=`<div class='top'><h2>Sensor Monitoring</h2></div><div class='grid'>
  ${sensor('Soil Sensor',!state.sensorFail,state.soil.toFixed(1)+'%')}${sensor('Tank Sensor',true,state.tank.toFixed(1)+'%')}${sensor('Flow Sensor',true,state.flow.toFixed(1)+' L/min')}${sensor('Temperature Sensor',!state.sensorFail,state.temp.toFixed(1)+'°C')}${sensor('Battery Voltage',true,(11+(state.battery/100)*1.6).toFixed(2)+'V')}${sensor('Solar Power Input',true,state.solarIn.toFixed(1)+'W')}</div>`;

  weather.innerHTML=`<div class='top'><h2>Weather</h2></div><div class='row'><button onclick="setWeather('Sunny')">Sunny</button><button onclick="setWeather('Cloudy')">Cloudy</button><button onclick="setWeather('Rain')">Rain</button><button onclick="setWeather('Storm')">Storm</button></div><p class='muted'>Weather affects moisture, solar charging, and irrigation safety logic.</p>`;

  analytics.innerHTML=`<div class='top'><h2>Analytics / History</h2></div><div class='grid'>
  <div class='card'><div class='title'>Soil Moisture</div><canvas id='soilChart'></canvas></div>
  <div class='card'><div class='title'>Water Usage</div><canvas id='waterChart'></canvas></div>
  <div class='card'><div class='title'>Pump Runtime</div><canvas id='runtimeChart'></canvas></div>
  <div class='card'><div class='title'>Temperature</div><canvas id='tempChart'></canvas></div>
  <div class='card'><div class='title'>Battery</div><canvas id='batteryChart'></canvas></div></div>`;

  notifications.innerHTML=`<div class='top'><h2>Notifications Center</h2><button onclick="state.notes=[];render()">Clear</button></div><div class='list'>${state.notes.slice(0,80).map(n=>`<div class='item'><span>${n.msg}</span><span class='muted'>${n.t}</span></div>`).join('')||'<div class=muted>No notifications yet.</div>'}</div>`;
  health.innerHTML=`<div class='top'><h2>System Health</h2></div><div class='grid'>${card('ESP32 Status',state.online?'<span class=ok>Healthy</span>':'<span class=bad>Offline</span>')}${card('WiFi Signal',state.wifi+'%')}${card('Battery Health',state.battery>25?'<span class=ok>Good</span>':'<span class=warn>Low</span>')}${card('Sensor Health',!state.sensorFail?'<span class=ok>Nominal</span>':'<span class=bad>Failure</span>')}${card('Pump Health',!state.pumpFail?'<span class=ok>Good</span>':'<span class=bad>Failure</span>')}${card('Solar Charging',state.solarIn>12?'<span class=ok>Active</span>':'<span class=warn>Weak</span>')}${card('Device Uptime',Math.floor(state.uptime)+' s')}</div>`;
  settings.innerHTML=`<div class='top'><h2>Settings</h2></div><div class='list'>
  <label class='item'>Dark mode <input type='checkbox' ${state.dark?'checked':''} onchange='state.dark=this.checked;render()'></label>
  <label class='item'>Auto irrigation <input type='checkbox' ${state.auto?'checked':''} onchange='state.auto=this.checked'></label>
  <label class='item'>Notifications <input type='checkbox' ${state.notify?'checked':''} onchange='state.notify=this.checked'></label>
  <label class='item'>Simulation speed <input type='range' min='0.5' max='4' step='0.5' value='${state.speed}' onchange='state.speed=parseFloat(this.value)'></label>
  <button onclick='resetSystem()'>Reset system</button></div>`;
  profile.innerHTML=`<div class='top'><h2>Profile</h2></div><div class='grid'>${card('Farmer',state.profile.farmer)}${card('Farm',state.profile.farm)}${card('Farm Size',state.profile.size)}${card('Water Saved',(state.waterUsed*0.18).toFixed(1)+' m³')}${card('Irrigation Runtime',Math.floor(state.pumpRuntime)+' s')}${card('Device Count',devices.length)}</div>`;
  lab.innerHTML=`<div class='top'><h2>Simulation Lab</h2></div><div class='row'>
  <button onclick="setWeather('Storm')">Rainstorm</button><button onclick="state.soil=10;addNote('Drought simulated','warn')">Drought</button><button onclick="state.tank=2;addNote('Tank empty simulated','bad')">Tank empty</button><button onclick="state.leak=!state.leak;addNote('Pipe leak '+(state.leak?'enabled':'cleared'),state.leak?'bad':'ok')">Pipe leak</button><button onclick="state.pumpFail=!state.pumpFail;addNote('Pump failure '+(state.pumpFail?'detected':'cleared'),state.pumpFail?'bad':'ok')">Pump failure</button><button onclick="state.sensorFail=!state.sensorFail;addNote('Sensor failure '+(state.sensorFail?'detected':'cleared'),state.sensorFail?'bad':'ok')">Sensor failure</button><button onclick="state.battery=8;addNote('Low battery simulated','warn')">Low battery</button><button onclick="state.online=!state.online;addNote('Internet '+(state.online?'restored':'lost'),state.online?'ok':'bad')">Internet loss</button></div>`;
  devices.innerHTML=`<div class='top'><h2>Device Manager</h2></div><div class='list'>${devices.map(d=>`<div class='item'><div><b>${d}</b><div class='muted'>Last sync: ${new Date().toLocaleTimeString()}</div></div><div class='${state.online?'ok':'bad'}'>${state.online?'Online':'Offline'}</div></div>`).join('')}</div>`;
}

function card(t,v){return `<div class='card'><div class='title'>${t}</div><div class='value'>${v}</div></div>`}
function sensor(name,on,val){return `<div class='card'><div class='title'>${name}</div><div class='value'>${val}</div><div class='${statusClass(on)}'>${on?'Online':'Offline / Fault'}</div></div>`}
function setWeather(w){state.weather=w; if(w==='Rain'||w==='Storm') addNote('Rain detected','warn'); render();}
function healthStatus(){ if(!state.online||state.pumpFail||state.leak) return '<span class=bad>Critical</span>'; if(state.battery<20||state.tank<15) return '<span class=warn>Warning</span>'; return '<span class=ok>Healthy</span>'; }
function resetSystem(){ Object.assign(state,{weather:'Sunny',online:true,rain:false,storm:false,soil:62,tank:78,temp:29,flow:0,battery:73,solarIn:31,pump:false,valve:false,leak:false,pumpFail:false,sensorFail:false,pumpRuntime:0,waterUsed:0,uptime:0,wifi:86,notes:[],history:{t:[],soil:[],temp:[],battery:[],water:[],runtime:[]}}); charts={}; addNote('System reset complete'); render(); }

setTimeout(()=>{splash.classList.add('hide'); login.classList.remove('hide');},1400);
loginBtn.onclick=()=>{state.profile.farmer=user.value||state.profile.farmer; state.profile.farm=farm.value||state.profile.farm; login.classList.add('hide'); app.classList.remove('hide'); renderNav(); render(); addNote('Welcome to WaterWise'); setInterval(simulate,1000); };
</script>
</body>
</html>

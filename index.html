<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
  <title>WaterWise – Smart Farming</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 24 24'><path fill='%2307f195' d='M12 2c5.523 0 10 6.477 10 12-1.333-3.644-5-8-10-8S3.334 8.357 2 12C2 7.477 6.477 2 12 2Z'/></svg>">
  <!-- Chart.js CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    /* === GLOBAL RESETS === */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    html, body {
      width: 100vw;
      height: 100vh;
      font-family: 'Segoe UI', 'Roboto', 'Arial', sans-serif;
      background: var(--background);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      overscroll-behavior-y: contain;
      scroll-behavior: smooth;
    }
    :root {
      /* Colors */
      --green: #07F195;
      --green-dark: #119873;
      --blue: #1BF2FB;
      --deep-blue: #232D3A;
      --gray-dark: #181D23;
      --gray: #2B323B;
      --gray-light: #30363d;
      --white: #fff;
      --error: #ff4955;
      --warning: #f5b600;
      --success: #18e58a;
      --glass: rgba(30,36,50,0.7);

      /* Backgrounds */
      --gradient: linear-gradient(130deg,#12243F 50%,#1BF2FB 100%);
      --gradient-light: linear-gradient(130deg,#33efa9 0%,#1BF2FB 100%);

      /* App */
      --background: #181d23;
      --card-bg: rgba(32,40,50,0.7);
      --glass-bg: rgba(26, 31, 45, 0.92);
      --nav-bg: #21262B99;
      --shadow: 0 2px 20px 0 rgba(11,74,75,0.10);
      --surface: rgba(255,255,255,0.03);

      --text: #fff;
      --subtext: #b4d1e2;
      --overlay-blur: 28px;

      /* Animations */
      --speed-fast: 250ms;
      --speed: 600ms;
    }
    body.light {
      --background: #F7FBFD;
      --card-bg: rgba(255,255,255,0.82);
      --glass-bg: rgba(245, 255, 251, 0.95);
      --nav-bg: #eefaffcc;
      --text: #121b18;
      --subtext: #51677e;
      --surface: rgba(0,40,147,0.05);
      --gradient: linear-gradient(130deg,#D0FFE9 0%,#DFF6FF 100%);
    }

    /* === GLASSMORPHISM CARD === */
    .glass-card {
      background: var(--card-bg);
      box-shadow: var(--shadow);
      border-radius: 20px;
      backdrop-filter: blur(var(--overlay-blur));
      -webkit-backdrop-filter: blur(var(--overlay-blur));
      padding: 1.3rem 1.1rem;
      margin: .5rem 0;
      border: 1px solid rgba(255,255,255,0.09);
      position: relative;
      overflow: hidden;
      transition: box-shadow 0.3s cubic-bezier(.38,.76,.58,1.52);
    }
    .glass-card:hover {
      box-shadow: 0 4px 28px 0 rgba(11,74,75,0.16);
    }

    /* === APP WRAPPER === */
    #app {
      min-height: 100vh;
      width: 100vw;
      background: var(--gradient);
      position: relative;
      z-index: 0;
      user-select: none;
    }

    /* === SPLASH SCREEN === */
    #splash {
      position: fixed;
      z-index: 99999;
      width: 100vw;
      height: 100vh;
      background: linear-gradient(130deg, #36f7a6 30%, #1a468a 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      animation: splashIn 1.3s cubic-bezier(.68,-0.55,.27,1.55);
    }
    @keyframes splashIn {
      0% { opacity: 0; transform: scale(0.98);}
      100%{opacity: 1; transform: scale(1);}
    }
    #splash-logo {
      margin-bottom: 1.9em;
      animation: splashBounce 2.1s infinite alternate cubic-bezier(.82,-0.53,.19,1.72);
    }
    @keyframes splashBounce {
      0% { transform: translateY(0);}
      80% { transform: translateY(-9px);}
      100%{ transform: translateY(1px);}
    }
    #splash-logo svg {
      width: 100px; height: 100px;
      filter: drop-shadow(0 2px 38px #58fcd6b3)
              drop-shadow(0 0px 14px #1bf2fb4d);
    }
    #splash-loader {
      display: flex;
      align-items: center;
      margin-bottom: 1em;
      font-size: 1.22em;
    }
    .water-dot {
      display: inline-block;
      width: 10px; height: 10px;
      border-radius: 30%;
      margin-right: 7px;
      background: var(--green);
      animation: dotIn .7s infinite alternate;
    }
    .water-dot:nth-child(2){ animation-delay: 0.25s;}
    .water-dot:nth-child(3){ animation-delay: 0.5s;}
    @keyframes dotIn {
      from{transform: scale(1);}
      to{transform: scale(1.7); background: var(--blue);}
    }
    .splash-seq {
      font-family: 'IBM Plex Mono', monospace;
      font-size: .87em;
      color: #f4fff9;
      opacity: .87;
      letter-spacing: 0.04em;
      margin-top: .6em;
      white-space: pre;
      text-align: left;
      line-height: 1.3;
      width: 220px;
      padding-left: 12px;
      animation: typeIn 1.8s steps(40);
    }
    @keyframes typeIn {
      from { width: 0 }
      to { width: 220px }
    }

    /* === WELCOME/ONBOARDING === */
    #onboarding {
      display: none;
      position: fixed;
      z-index: 40;
      width: 100vw; height: 100vh;
      top: 0; left: 0;
      background: var(--background);
      animation: fadein-onboard .7s;
      justify-content: center;
      align-items: center;
    }
    @keyframes fadein-onboard {
      from { opacity: 0; }
      to { opacity: 1;}
    }
    .onboard-wrap {
      width: 94vw;
      max-width: 420px;
      background: var(--glass-bg);
      border-radius: 23px;
      box-shadow: var(--shadow);
      padding: 1.7em 1.4em 1.3em 1.4em;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: start;
      animation: fadein-onboard 0.62s;
    }
    .onboard-slides {
      width: 100%;
      min-height: 240px;
      display: flex;
      flex-direction: row;
      overflow: hidden;
      position: relative;
    }
    .slide {
      min-width: 100%;
      transition: transform var(--speed-fast) cubic-bezier(.68,-0.55,.27,1.55);
      will-change: transform;
      opacity: 0.99;
      padding-bottom: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .slide.active {
      transform: translateX(0%);
      opacity: 1;
    }
    .slide.inactive {
      transform: translateX(120%);
      opacity: 0.12;
    }
    .onboard-img {
      width: 68px; height: 68px;
      border-radius: 20px;
      background: var(--gradient);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 0.7em;
      box-shadow: 0 4px 24px #0cebeb3e;
    }
    .onboard-img svg {
      width: 44px; height: 44px;
    }
    .onboard-title {
      font-weight: 700;
      font-size: 1.11em;
      margin-bottom: .5em;
      color: var(--text);
      text-align: center;
    }
    .onboard-desc {
      font-weight: 400;
      line-height: 1.45;
      font-size: .99em;
      color: var(--subtext);
      margin-bottom: .6em;
      text-align: center;
    }
    .onboard-controls {
      width: 100%;
      display: flex;
      flex-direction: row;
      justify-content: space-between;
      align-items: center;
      margin-top: 7px;
    }
    .onboard-progress {
      display: flex; gap: 4px;
      margin-inline: 6px;
    }
    .onboard-progress-dot {
      width: 11px; height: 11px;
      border-radius: 99px;
      background: var(--green-dark);
      opacity: 0.21;
      transition: opacity .35s;
    }
    .onboard-progress-dot.active {
      opacity: 1;
      background: var(--green);
      box-shadow: 0 0 0 3px #25e1b055;
    }
    .onboard-btn {
      background: var(--gradient);
      color: #fff;
      font-weight: 600;
      padding: 0.67em 2.1em;
      border-radius: 15px;
      font-size: 1em;
      border: none;
      outline: none;
      cursor: pointer;
      box-shadow: 0 2px 18px #36f7a644;
      transition: transform 0.17s;
      margin-left:10px;
      user-select: none;
    }
    .onboard-btn:active {
      transform: scale(0.97);
    }
    .onboard-skip {
      background: none;
      border: none;
      color: var(--blue);
      font-weight: 400;
      font-size: 1em;
      opacity: .9;
      margin-right: 18px;
      text-decoration: underline;
      cursor: pointer;
    }

    /* === LOGIN SCREEN === */
    #login {
      display: none;
      position: fixed;
      z-index: 20;
      width: 100vw; height: 100vh;
      top: 0; left: 0;
      background: var(--background);
      padding-top: 13vh;
      animation: fadein-login .5s;
      align-items: flex-start;
      justify-content: center;
    }
    @keyframes fadein-login {
      from{opacity:0;}
      to{opacity:1;}
    }
    .login-wrap {
      width: 93vw;
      max-width: 378px;
      margin: auto;
      background: var(--glass-bg);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: 2.3em 1.4em 2.2em 1.4em;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      animation: fadein-login 0.77s;
    }
    .login-logo {
      background: var(--gradient-light);
      padding: 15px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      margin-bottom: 1em;
      box-shadow: 0 2px 18px #1bf2fb44;
    }
    .login-logo svg { width: 39px; height: 39px;}
    .login-title {
      font-weight: 700;
      font-size: 1.24em;
      letter-spacing: 0.04em;
      margin-bottom: .33em;
      color: var(--text);
    }
    .login-form {
      width: 100%;
    }
    .login-field {
      width: 100%;
      margin-bottom: 1.15em;
      position: relative;
    }
    .login-field label {
      font-size: 1em;
      font-weight: 500;
      color: var(--subtext);
      margin-bottom: 0.14em;
      display: block;
      padding-left: 2px;
    }
    .login-input {
      width: 100%;
      padding: .83em 3.1em .83em .94em;
      border-radius: 14px;
      border: none;
      outline: none;
      background: var(--surface);
      font-size: 1em;
      color: var(--text);
      margin-top: 2px;
      font-weight: 400;
      transition: background 0.17s;
    }
    .login-input:focus {
      background: rgba(2,210,143,0.07);
      border: 1px solid var(--green);
    }
    .show-hide {
      position: absolute;
      right: 9px;
      top: 39px;
      font-size: 1.11em;
      color: var(--subtext);
      opacity: .73;
      background: none;
      border: none;
      cursor: pointer;
      z-index: 1;
      padding: 0;
      outline: none;
      transition: color .2s;
    }
    .show-hide:active { color:var(--green);}
    .login-fp {
      position: absolute;
      left: 2px;
      top: 41px;
      font-size: 1.27em;
      color: var(--blue);
      opacity: .68;
      background: none;
      border: none;
      outline: none;
      cursor: pointer;
      user-select: none;
    }
    .login-btn {
      width: 100%;
      background: var(--gradient);
      color: #fff;
      font-weight: 600;
      padding: 0.87em 0;
      border-radius: 12px;
      font-size: 1.06em;
      border: none;
      outline: none;
      cursor: pointer;
      box-shadow: 0 2px 18px #1bf2fb2a;
      margin-top: 1.1em;
      transition: transform 0.13s;
    }
    .login-btn:active { 
      transform: scale(.98);
      filter: brightness(1.11);
    }

    /* === MOBILE/MAIN UI === */
    .app-screen {
      display: none;
    }
    .app-screen.active {
      display: block;
    }
    /* === HEADER/BAR === */
    #header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--nav-bg);
      padding: 0.68em 1.13em 0.2em 1.2em;
      position: sticky;
      top: 0;
      z-index: 12;
      min-height:54px;
      box-shadow: 0 2px 8px #36f7a623;
      border-bottom: 1px solid rgba(44,66,95,0.075);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }
    .hdr-left {
      display: flex;
      align-items: center;
    }
    .hdr-logo svg {
      width: 29px; height: 29px;
    }
    .hdr-title {
      font-weight: 700;
      font-size: 1.18em;
      color: var(--text);
      margin-left: 11px;
      letter-spacing: .01em;
      filter: drop-shadow(0 2px 7px #25ffc32e);
    }
    .hdr-actions {
      display: flex;
      gap:11px;
      align-items: center;
    }
    .hdr-btn {
      background: none;
      border: none;
      outline: none;
      color: var(--blue);
      font-size: 1.19em;
      cursor:pointer;
      margin-right: 1px;
      padding: 4px 7px;
      display: inline-flex;
      align-items: center;
      border-radius: 99px;
      transition: background .16s;
      position: relative;
    }
    .hdr-btn:active {
      background: var(--surface);
    }
    .hdr-profile {
      width: 32px;height:32px;
      border-radius: 80px;
      background: var(--surface);
      overflow: hidden;
      border:2px solid var(--green);
      box-shadow: 0 3px 9px #36f7a629;
      margin-left: 3px;
      cursor:pointer;
      transition: filter .17s;
      filter: brightness(1);
    }
    .hdr-profile:hover { filter: brightness(1.18);}
    .hdr-profile img {
      width:100%;height:100%;
      object-fit:cover;
    }

    /* === FLOATING PARTICLES === */
    #fx-particles {
      position:fixed;
      pointer-events:none;
      z-index:0;
      left:0;top:0;width:100vw;height:100vh;
      overflow:visible;
    }
    .fx-p {
      position:absolute;
      width:9px;height:9px;
      border-radius:99px;
      background:linear-gradient(140deg,#25ffc3 40%,#1bf2fb 80%);
      opacity:.23;
      filter: blur(0.7px);
      animation: float-particle 5s linear infinite alternate;
    }
    .fx-p:nth-child(even){background:linear-gradient(140deg,#36f7a6 40%,#66b3ff 100%);}
    @keyframes float-particle {
      from{transform:translateY(0) scale(1);}
      to{transform:translateY(-34px) scale(0.8);}
    }

    /* === MAIN/DASHBOARD === */
    #dashboard {
      padding: 1.1em 5px 3.8em 5px;
      position: relative;
      min-height: 85vh;
      max-width: 640px;
      margin: auto;
      transition: background .4s;
    }
    .dash-grid {
      display: grid;
      grid-template-columns: repeat(2,1fr);
      gap: 13px;
      margin-top: 7px;
      margin-bottom: 15px;
    }
    .dash-card {
      background: var(--glass-bg);
      border-radius: 17px;
      box-shadow: 0 2px 12px #1bf2fb17;
      margin: 0;
      padding: 18px 11px 13px 11px;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      overflow: hidden;
      transition:box-shadow .27s;
    }
    .dash-card .dash-stat {
      font-size: 1.4em;
      font-weight: 700;
      color:var(--green);
      text-shadow: 0 1px 27px #12fad9bb;
      margin-bottom: 6px;
    }
    .dash-label {
      font-size: .97em;
      color: var(--subtext);
      font-weight: 400;
      letter-spacing: .04em;
    }
    /* Animated circular gauge */
    .circle-bar { width:60px;height:60px; margin-bottom:.92em;}
    .circle-svg {
      transform: rotate(-90deg);
    }
    .circle-bg {
      stroke: #244c5e44;
      stroke-width:10;
    }
    .circle-fg {
      stroke: var(--blue);
      stroke-width: 10;
      stroke-linecap: round;
      filter: drop-shadow(0 1px 7px #07f195bb);
      transition: stroke-dasharray .9s cubic-bezier(.6,-0.55,.21,1.9);
    }
    /* ==== STATUS INDICATORS ==== */
    .stat-dot {
      width: 13px; height: 13px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 7px;
      margin-bottom:-1.2px;
      transition: background .33s;
    }
    .stat-dot.green {background:var(--green);}
    .stat-dot.red {background:var(--error);}
    .stat-dot.yellow {background:var(--warning);}
    .stat-dot.blue {background:var(--blue);}
    /* ==== PROGRESS BAR ==== */
    .stat-bar {
      width:94px;height:10px;
      background:var(--surface);
      border-radius:8px;
      margin-bottom:9px;
      position:relative;
    }
    .stat-bar-inner {
      height: 100%;
      border-radius: 8px;
      background: linear-gradient(90deg,var(--green),var(--blue) 90%);
      transition: width 0.7s cubic-bezier(.61,.2,.45,1.63);
    }
    /* = QUICK ACTIONS = */
    .quick-btns {
      display: flex;
      gap: 16px;
      margin:13px 0 8px 0;
      width: 100%;
      justify-content: space-around;
    }
    .quick-btn {
      flex: 1;
      color: #fff;
      background: var(--gradient-light);
      border: none;
      border-radius: 15px;
      margin: 0 7px;
      padding: 0.97em;
      box-shadow: 0 3px 16px #36f7a632;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.97em;
      position: relative;
      overflow: hidden;
      transition: filter .2s;
      user-select: none;
    }
    .quick-btn:active {
      filter: brightness(1.2);
    }
    .emergency-btn {
      background: linear-gradient(137deg,#ff4955 30%,#fae100 120%);
      color: #232D3A;
      font-weight:800;
      font-size:1.07em;
      border: none;
      padding: 0.97em 1.4em;
      border-radius: 19px;
      margin-top:0.4em;
      box-shadow:0 5px 20px #ff49533b;
      animation: vib 1.7s infinite alternate;
    }
    @keyframes vib {
      from { box-shadow:0 3px 6px #ff495385;}
      to { box-shadow:0 7px 18px #ff4953bb;}
    }
    .fab-action {
      position: fixed;
      right: 25px; bottom: 93px;
      z-index: 19;
      width: 56px; height: 56px;
      border-radius: 99px;
      background: var(--gradient-light);
      box-shadow: 0 6px 20px #25ffc329;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.3em;
      cursor: pointer;
      border: none;
      outline: none;
      user-select: none;
      transition: opacity .13s;
      animation: fabpop .48s;
    }
    @keyframes fabpop {
      from{opacity:0;}
      to{opacity:1;}
    }
    .fab-action:active {
      background: linear-gradient(130deg,#3bd6db,#2ec783 130%);
      filter: brightness(1.18);
    }

    /* === PUMP / CONTROL SCREENS === */
    #pump, #irrigation, #sensors, #weather,
    #notifications, #history, #health,
    #settings, #profile, #simulation {
      padding:1.1em 11px 4.1em 11px;
      max-width: 600px;
      margin: auto;
      position: relative;
      min-height: 81vh;
    }
    .screen-title {
      font-weight: 700;
      font-size: 1.17em;
      letter-spacing: 0.03em;
      color: var(--text);
      padding-bottom: 7px;
    }
    /* Animated Pump motor */
    .pump-motor {
      width:92px;height:92px;
      border-radius:52px;
      margin:15px auto 2px;
      background:linear-gradient(130deg,var(--green),#1BF2FB 74%);
      display: flex;align-items: center;justify-content: center;
      box-shadow:0 8px 36px #1bf2fb2e,0 0 17px #36f7a633;
      position:relative;
      animation: pulse-motor 1.7s infinite alternate;
    }
    @keyframes pulse-motor {
      from{box-shadow: 0 8px 36px #1bf2fb2e, 0 0 17px #36f7a600;}
      to{box-shadow: 0 12px 60px #36f7a688, 0 0 25px #36f7a669;}
    }
    .motor-blade {
      width: 38px;
      height: 7px;
      background: #fff;
      border-radius: 8px;
      position: absolute;
      left: 27%;
      top: 49%;
      animation: motor-spin 0.9s linear infinite;
      box-shadow: 0 1px 9px #07f19560;
      opacity: .92;
      transform-origin: right center;
    }
    @keyframes motor-spin {
      0% {transform: rotate(0);}
      100% {transform: rotate(360deg);}
    }
    .motor-blade:nth-child(2){
      left:46%; top:17%;width:7px;height:38px;
      border-radius:8px;
    }
    .motor-blade:nth-child(3){
      left:16%;top:23%;width:25px;height:5px;
      transform:rotate(39deg);
    }
    .motor-center {
      width: 29px;height: 29px;border-radius: 99px;
      background: #12243F;box-shadow: 0 0 12px #36f7a68d;
      position: absolute;
      left:31px;top:32px;
    }
    .pump-anim-water {
      width:85px;height:8px;
      background: linear-gradient(98deg,#1bf2fb,#33efa9 86%);
      border-radius: 11px;
      margin: 11px auto 8px auto;
      box-shadow: 0 6px 14px #1bf2fb1f;
      position:relative;
      animation: waterflow 0.7s linear infinite;
      opacity: .79;
    }
    @keyframes waterflow {
      0%{left:0;}
      100%{left:14px;}
    }
    .control-btns {
      display:flex;
      gap:17px;
      margin:24px 0 12px 0;
      flex-wrap: wrap;
    }
    .control-btn {
      flex:1;
      min-width:110px;
      border-radius:14px;
      background:var(--gradient-light);
      color:#fff;
      padding:1em .7em;
      border:none;
      font-weight:600;
      font-size:1em;
      box-shadow:0 2px 10px #36f7a644;
      cursor:pointer;
      transition:filter .2s;
    }
    .control-btn:active {filter:brightness(1.2);}
    .runtime-counter {
      color: var(--green-dark);
      font-weight: 500;
      margin-top: 10px;
      margin-bottom:12px;
      font-size:1.13em;
    }
    .safety-warning {
      padding: 13px 11px;
      border-radius: 14px;
      background: #fffbf6;
      color: #d33636;
      font-size: 1em;
      font-weight: 600;
      border: 2px solid #ffa14f88;
      margin-top: 9px;
      box-shadow: 0 1px 10px #ff495322;
      text-align: center;
      animation: vib 1.2s infinite alternate;
    }
    /* === GAUGE/CHARTS === */
    .gauge {
      width: 83px;
      height: 83px;
      position: relative;
      margin: 8px auto;
    }
    .gauge-ring {
      width:100%;height:100%;
      position:absolute;top:0;left:0;
    }
    .gauge-bar {
      stroke-width: 12;
      fill: none;
      filter: drop-shadow(0 2px 16px #1BF2FB5f);
    }
    .gauge-bar-bg {
      stroke: #1a468a3c;
    }
    .gauge-label {
      position: absolute;
      width: 100%;
      top: 42%;
      text-align: center;
      font-weight: 700;
      color: var(--green);
      font-size:1.19em;
      text-shadow:0 2px 6px #1bf2fb3a;
    }

    /* === SENSOR SIMULATION === */
    .sim-section {
      margin-bottom:21px;
    }
    .sensor-grid {
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:17px;
    }
    .sensor-card {
      background:var(--glass-bg);
      border-radius:15px;
      box-shadow:0 2px 9px #33efa931;
      padding:14px;
      display:flex;
      flex-direction:column;
      align-items:center;
      position:relative;
    }
    .sensor-label {
      font-size:.97em;
      color:var(--subtext);
    }

    /* === WEATHER === */
    .weather-now {
      display: flex; align-items: center;justify-content: space-between;
      margin-bottom:19px;
    }
    .weather-num {
      font-size:2.56em;
      font-weight:700;
      color:var(--blue);
      text-shadow:0 2px 25px #1bf2fb3d;
    }
    .weather-cond {
      font-size:1.13em;
      font-weight:600;
      color:var(--text);
      margin-bottom:7px;
    }
    .weather-anim {
      min-width: 78px; min-height: 78px;
      margin-top:4px;
      display: flex;align-items: center;justify-content:center;
      position: relative;
    }
    /* Day/night, clouds, rain etc. see later JS */
    .forecast-cards {
      display: flex; gap:13px;margin-top:17px;
      overflow-x:auto;
      scrollbar-width: none;
    }
    .forecast-card {
      min-width:77px;
      background:var(--card-bg);
      padding:8px;
      border-radius:14px;
      text-align:center;
      color:var(--text);
      box-shadow:0px 2px 7px #33efa931;
    }
    .fc-day {
      font-size:.99em; color:var(--text);font-weight:600;
    }
    .fc-icon {
      font-size:1.8em; margin:6px 0 0 0;
    }
    .fc-temp {
      font-size:1.04em;color:var(--blue);font-weight:600;
    }

    /* === NOTIFICATIONS === */
    .notif-list {
      margin-top:10px;
    }
    .notif-item {
      background:var(--card-bg);
      border-radius:13px;
      padding:11px 13px;
      margin-bottom:9px;
      box-shadow:0 1px 4px #25ffc319;
      display: flex;
      align-items: flex-start;
      gap:11px;
      font-size:.95em;
      position: relative;
      transition:box-shadow .24s;
    }
    .notif-dot {
      width:15px;height:15px;border-radius:99px;
      margin-right:8px;margin-top:2px;
    }
    .notif-dot.green {background:var(--green);}
    .notif-dot.red {background:var(--error);}
    .notif-dot.yellow {background:var(--warning);}
    .notif-dot.blue {background:var(--blue);}
    .notif-time {
      color:var(--subtext);font-size:.87em;
      margin-left:auto;margin-top:2px;
    }
    .notif-badge {
      display:inline-block;
      text-align:center;
      min-width:20px;
      background:var(--blue);
      color:#fff;
      border-radius:9px;
      font-size:.81em;
      font-weight: 600;
      margin-left:5px;
      padding:0 6px;
      opacity:.93;
    }
    .toast {
      position: fixed;
      bottom:88px;
      left:50%;
      transform:translateX(-50%);
      background:var(--card-bg);
      color:var(--text);
      padding:13px 24px;
      border-radius:16px;
      box-shadow:0 2px 18px #1bf2fb29;
      font-weight:600;
      font-size:1.07em;
      z-index:99;
      opacity:0;
      pointer-events: none;
      transition:opacity .4s;
    }
    .toast.show {opacity:1; pointer-events:all;}

    /* === HISTORY & ANALYTICS === */
    .chart-wrap {
      background:var(--glass-bg);
      padding:17px 13px;
      border-radius:15px;
      margin-bottom:18px;
      box-shadow:0 2px 14px #33efa931;
    }
    .hist-log {
      background:var(--glass-bg);
      border-radius:13px;
      margin-bottom: 13px;
      padding:11px 13px;
      box-shadow: 0 1px 8px #36f7a614;
      font-size:.96em;
    }

    /* === SYSTEM HEALTH === */
    .health-list {
      margin:19px 0 9px 0;
      display: grid;
      grid-template-columns:repeat(2,1fr);
      gap:15px;
    }
    .health-card {
      background:var(--card-bg);
      border-radius:15px;
      padding:13px;
      box-shadow:0 1px 4px #33efa919;
      text-align:center;
      font-size:1em;
      font-weight:500;
    }
    .health-status.green {color:var(--success);}
    .health-status.yellow {color:var(--warning);}
    .health-status.red {color:var(--error);}
    .uptime-ct {
      color:var(--blue);
      font-size:.98em;
      font-weight:600;
      margin-top:8px;
    }

    /* === SETTINGS === */
    .settings-list {
      margin:18px 0;
    }
    .settings-item {
      display:flex;justify-content:space-between;
      align-items:center;
      background:var(--card-bg);
      border-radius:14px;
      padding:13px 17px;
      margin-bottom:13px;
      box-shadow: 0 1px 6px #1bf2fb19;
    }
    .settings-label {
      font-size:1.01em;color:var(--text);
      font-weight:500;
    }
    .settings-toggle {
      width:44px;height:26px;background:#333;
      border-radius:15px;position:relative;cursor:pointer;
      transition:background .23s;
      box-shadow:0 2px 7px #33efa912;
      border:none;outline:none;
    }
    .settings-toggle.active {
      background:var(--green);
    }
    .toggle-knob {
      position:absolute;
      left:2.5px; top:2.67px;
      width:21px; height:21px;
      background:#fff;
      border-radius:15px;
      transition:left .22s;
      box-shadow:0 0px 4px #33efa929;
    }
    .settings-toggle.active .toggle-knob {
      left:20px;
      background: var(--blue);
    }
    .setting-select {
      background:var(--surface);
      border:none;outline:none;
      border-radius:8px;
      font-size:.99em;
      color:var(--text);
      padding:4px 11px;
      margin-left:10px;
    }
    .settings-slider {
      accent-color:var(--green-dark);
      width:100px;
      margin-left:8px;
    }
    .fake-wifi {
      margin-top:11px;
      background:var(--surface);
      padding:10px 14px;
      border-radius:10px;
      box-shadow:0 2px 7px #1bf2fb19;
      font-size:.98em;
      font-weight:500;
      color:var(--blue);
      border-left:4px solid #1a468a3c;
    }

    /* === PROFILE === */
    .profile-card {
      background:var(--glass-bg);
      border-radius:19px;
      box-shadow:0 3px 16px #36f7a632;
      padding:28px 14px 16px 14px;
      display:flex;
      flex-direction:column;
      align-items:center;
      margin-bottom:18px;
    }
    .profile-img {
      width:79px;height:79px;
      border-radius:60px;
      margin-bottom:11px;
      box-shadow:0 1px 16px #1bf2fb1c;
    }
    .profile-title {
      font-weight:700;font-size:1.25em;
      color:var(--green-dark);
      text-shadow:0 1px 13px #1bf2fb4f;
      margin-bottom:5px;
    }
    .profile-farm, .profile-devices, .profile-water {
      font-size:1.04em;color:var(--subtext);
    }
    .profile-label {
      font-weight: 600;
      color: var(--text);
      font-size:.97em;
      margin-top:2px;
    }

    /* === SIMULATION PANEL === */
    .sim-panel {
      background:var(--glass-bg);
      border-radius:18px;
      padding:19px 18px;
      margin-bottom:15px;
      box-shadow:0 2px 14px #1bf2fb22;
    }
    .sim-buttons {
      display:flex;
      flex-wrap:wrap;
      gap:15px;
      margin-bottom:12px;
    }
    .sim-btn {
      flex:1 1 40%;
      min-width:120px;
      background:var(--gradient);
      color:#fff;
      border:none;
      border-radius:14px;
      padding:1em .6em;
      font-weight:700;
      box-shadow:0 2px 9px #1bf2fb22;
      cursor:pointer;
      margin-bottom:7px;
      margin-right:9px;
      font-size:1em;
      transition:filter .22s;
    }
    .sim-btn:active {filter:brightness(1.14);}
    .sim-label {
      margin-top:9px;
      color:var(--subtext);
      font-size:.97em;
    }

    /* === BOTTOM NAVIGATION === */
    #nav-bar {
      position: fixed;
      bottom: 0;left:0;
      width:100vw;
      height: 67px;
      max-width:640px;
      background:var(--nav-bg);
      z-index: 21;
      display: flex;
      justify-content: space-around;
      align-items: center;
      gap:11px;
      box-shadow: 0 -2px 22px #36f7a629;
      border-top: 1.5px solid rgba(44,66,95,0.1);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      font-size:1em;
      transition:background .3s;
    }
    .nav-btn {
      flex:1;display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      border:none;outline:none;
      background:none;
      color:var(--subtext);
      padding:8px 0 0 0;
      border-radius:12px;
      position:relative;
      transition:color .19s,background .18s;
      font-size:1.14em;
      font-weight:600;
      user-select:none;
      cursor: pointer;
    }
    .nav-btn.active {
      color:var(--green);
      background:var(--surface);
      font-weight:700;
    }
    .nav-btn:active {background-color:var(--surface);color:var(--blue);}
    .nav-label {
      font-size:.81em;
    }
    .nav-badge {
      position:absolute;
      top:10px;right:19px;
      width:17px;height:17px;
      background:var(--error);
      color:#fff;font-size:.87em;
      display:flex;align-items:center;justify-content:center;
      border-radius:12px;box-shadow:0 2px 10px #ff495255;
      font-weight:700;
    }

    /* === DARK MODE SWITCH === */
    .toggle-theme-btn {
      background:var(--surface);
      color:var(--blue);
      border:none;outline:none;
      border-radius:10px;
      padding:8px 16px;
      font-weight:600;font-size:1em;margin-top:15px;
      margin-bottom:21px;
      cursor:pointer;
      box-shadow:0 1px 6px #1bf2fb19;
      transition:background .21s;
    }
    .toggle-theme-btn:active{background:var(--gradient);color:#fff;}
    /* === ANIMATIONS === */
    .page-enter {
      animation:fadein-main 0.55s;
    }
    @keyframes fadein-main {
      from{transform:translateY(28px);opacity:0;}
      to{transform:translateY(0);opacity:1;}
    }
    .ripple {
      position: absolute;
      border-radius: 50%;
      opacity: 0.35;
      pointer-events: none;
      z-index:2;
      background: var(--blue);
      transform: scale(0);
      animation: ripple-in .7s cubic-bezier(.42,.62,.08,.97);
    }
    @keyframes ripple-in {
      to {
        transform: scale(4.5);
        opacity: 0;
      }
    }
    /* === LOADING SKELETONS === */
    .skeleton {
      background:linear-gradient(100deg,#e3fdf491 40%,#0cebeb17 50%,#36f7a617 100%);
      border-radius:12px;
      min-height:22px;
      margin-bottom:0.8em;
      position:relative;
      overflow:hidden;
      animation:skeleton-blink 1.4s infinite linear;
      filter:brightness(1.06);
    }
    @keyframes skeleton-blink {
      0% {opacity:1;}
      50% {opacity:.25;}
      100% {opacity:1;}
    }

    /* === MEDIA QUERIES === */
    @media only screen and (min-width: 640px){
      #dashboard, #pump, #irrigation, #weather, #sensors,#notifications,#history,#health,#settings,#profile,#simulation {
        border-radius: 24px 24px 0 0;
        margin-top: 0.7em;
        margin-bottom: 3vw;
        max-width: 500px;
        background: var(--glass-bg);
      }
      #nav-bar {
        left:50%;
        margin-left:-320px;
        max-width:640px;
        border-radius:0 0 24px 24px;
      }
    }
    @media only screen and (max-width:430px) {
      .dash-grid, .sensor-grid, .health-list {
        grid-template-columns:1fr;
      }
      .forecast-cards{
        flex-wrap:wrap;
      }
    }

    /* === SCROLLBAR === */
    ::-webkit-scrollbar {
      display: none;
    }
  </style>
</head>

<script>
/**
 * WaterWise - Smart Farming Web App Demo
 * 
 * Everything is simulated - all data and device events are handled with in-browser JS logic below.
 */

/* ==== Utilities ==== */
// Shortcuts for DOM elem
const $ = sel => document.querySelector(sel);
const $$ = sel => document.querySelectorAll(sel);

function sleep(ms) {
  return new Promise(res => setTimeout(res, ms));
}

// Show toast
function showToast(msg, time=1900) {
  const t = $('#toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), time);
}

/* ==== Global State ====
 * This app's logic and simulation is based on these state objects.
 */
const farmState = {
  soil: { moisture: 43, desired: 60 },      // %
  tank: { level: 65, capacity: 1400 },      // % (litres)
  flow: 1.3,                                // L/min
  temp: 20,                                 // °C
  weather: {
    temp: 19, rain: 8, condition: 'Cloudy', wind: 9, humidity: 62, night: false,
    forecast: [], // see below
  },
  pump: { on: false, hours: 21, minutes: 12, started: null, failure: false },
  valve: { open: false, failure: false },
  battery: { level: 89, solar: true, charging: true, low: false },
  internet: true,
  health: {
    device: 'good', sensors: 'good', wifi: 'good', battery: 'good', solar: 'good', uptime: 0,
  },
  alerts: [],
  history: [],
  profile: {
    name: "Sarah Fielding",
    farmName: "Emerald Acres",
    location: "Ceres Valley",
    devices: 7,
    waterSaved: 31700, // litres
  },
  simulation: "",

  const pct = Math.max(0,Math.min(100,Math.round((value/max)*100)));
  return `<div class="dash-card">

function pumpStatusText() {
  if(farmState.pump.failure) return "Failed";
  return farmState.pump.on?"ON":"OFF";
}
function systemHealthText() {
  const h = farmState.health;
  if(h.device==='good'&&h.sensors==='good'&&h.battery==='good'&&h.solar==='good') return "All OK";
  if(h.battery==='bad'||h.solar==='bad') return "Power Issue";
  if(h.device==='bad') return "Device Fault";
  if(h.sensors==='bad') return "Sensor Degraded";
  return "Checking...";
}
function healthStatusVal() {
  const h = farmState.health;
  let v = h.device==='good'?100:60;
  if(h.battery!=='good') v = 45;
  if(h.sensors!=='good') v = 55;
  return v;
}
function systemHealthDot() {
  const h = farmState.health;
  if(h.device!=='good'||h.battery!=='good') return 'red';
  if(h.sensors!=='good') return 'yellow';
  return 'green';
}

      <button class="control-btn" onclick="valveOpen()">${farmState.valve.open?"Close":"Open"} Valve</button>

function getPumpRuntime() {
  if(!farmState.pump.started) return "00:00";
  let s = Math.floor((Date.now()-farmState.pump.started)/1000);
  let m = Math.floor(s/60), h = Math.floor(m/60);
  s %= 60; m %= 60;
  return (h<10?'0':'')+h+":"+(m<10?'0':'')+m+":"+(s<10?'0':'')+s;
}

function pumpStart() {
  // Safety check
  if(farmState.tank.level<8||farmState.pump.failure) {
    showToast("Cannot start: Tank low or pump failed",1800); return;
  }
  farmState.pump.on=true;
  farmState.pump.started = Date.now();
  farmState.valve.open=true;
  showToast("Pump started");
  addAlert("Pump started",'good');
  renderScreen(currentScreen);
}
function pumpStop() {
  farmState.pump.on=false;
  farmState.valve.open=false;
  showToast("Pump stopped");
  addAlert("Pump stopped",'info');
  renderScreen(currentScreen);
}
function valveOpen() {
  farmState.valve.open = !farmState.valve.open;
  showToast(farmState.valve.open?"Valve opened":"Valve closed");
  renderScreen(currentScreen);
}

function historyLog() {
  if(!farmState.history.length)
    return `<span class="skeleton" style="height:13px;margin:0;width:70%"></span>`;
  let log = farmState.history.slice(-8).reverse().map(a=>`[${a.time}] ${a.event}`).join('<br>');
  return log;
}

function renderHealth() {
  let h=farmState.health;
  let html = `<div class="screen-title">System Health & Status</div>
    <div class="health-list">
      ${healthCard("Device Health",h.device)}
      ${healthCard("Sensor Health",h.sensors)}
      ${healthCard("Wi-Fi Strength",h.wifi)}
      ${healthCard("Battery Health",h.battery)}
      ${healthCard("Solar Charge",h.solar)}

    </div>
  `;
  $('#health').innerHTML = html;
}
function healthCard(label,status) {
  let color = status==='good'?'green':status==='ok'?'yellow':'red';
  let msg = status==='good'?'✓ Ok':status==='ok'?'⚠ Check':'✗ Fault';
  return `<div class="health-card">
    ${label}<br>
    <span class="health-status ${color}">${msg}</span>
  </div>`;
}
function getUptime() {
  let t = Math.floor((Date.now()-farmState.bootTime)/1000), d = Math.floor(t/86400);
  let h = Math.floor((t%86400)/3600), m = Math.floor((t%3600)/60), s = t%60;
  return `${d}d ${h}h ${m}m ${s}s`;
}

/* ======= DEMO SIMULATION PANEL ====== */
function renderSimulation() {
  let s = farmState.demoEvents;
  let html = `<div class="screen-title">Demo Simulation Panel</div>
  <div class="sim-panel">
    <div class="sim-label">Trigger simulated events for WaterWise:</div>
    <div class="sim-buttons">
      <button class="sim-btn" onclick="simEvent('rainstorm')">${s.rainstorm?'☔ Simulating...':'🌧️ Rainstorm'}</button>
      <button class="sim-btn" onclick="simEvent('tankEmpty')">${s.tankEmpty?'🛢️ Simulating...':'🛢️ Tank Empty'}</button>
      <button class="sim-btn" onclick="simEvent('pipeLeak')">${s.pipeLeak?'💦 Simulating...':'💦 Pipe Leak'}</button>
      <button class="sim-btn" onclick="simEvent('sensorFail')">${s.sensorFail?'🚨 Simulating...':'🚨 Sensor Fail'}</button>
      <button class="sim-btn" onclick="simEvent('pumpFail')">${s.pumpFail?'🚫 Simulating...':'🚫 Pump Fail'}</button>
      <button class="sim-btn" onclick="simEvent('solarLoss')">${s.solarLoss?'🔋 Simulating...':'🔋 Solar Loss'}</button>
    </div>
    <div class="sim-label"><b>Status:</b> ${getSimulationEvent()}</div>
  </div>
  <div style="margin-top:30px;color:var(--subtext);font-size:1em;font-weight:500;">
    The entire WaterWise app auto-reacts to event triggers.<br>
    Try simulating rain or failures to see smart system behaviors.
  </div>
  `;
  $('#simulation').innerHTML = html;
}
function simEvent(e) {
  // Toggle event
  for(let k in farmState.demoEvents) farmState.demoEvents[k]=false;
  farmState.simulation = e;
  farmState.demoEvents[e]=true;
  addAlert(`${simEventName(e)} triggered [simulation]`,'warn');
  reactToDemoEvent(e);
  renderSimulation();
}
function simEventName(e) {
  switch(e) {
    case 'rainstorm': return "Rainstorm";
    case 'tankEmpty': return "Tank Empty";
    case 'pipeLeak': return "Pipe Leak";
    case 'sensorFail': return "Sensor Failure";
    case 'pumpFail': return "Pump Failure";
    case 'solarLoss': return "Solar Charging Loss";
    default: return "";
  }
}
function getSimulationEvent() {
  for(let k in farmState.demoEvents)
    if(farmState.demoEvents[k]) return `${simEventName(k)} active!`;
  return "None";
}
function reactToDemoEvent(e) {
  switch(e) {
    case 'rainstorm':
      farmState.weather.rain=97;
      farmState.weather.condition='Rainy';
      if(farmState.pump.on) { pumpStop(); }
      farmState.history.push({event:"Irrigation halted: rain detected",time:getTimeNow()});
      break;
    case 'tankEmpty':
      farmState.tank.level=0;
      if(farmState.pump.on) { pumpStop(); }
      addAlert("Tank empty",'danger');
      farmState.history.push({event:"Tank went empty (simulation)",time:getTimeNow()});
      break;
    case 'pipeLeak':
      farmState.flow=3.8;
      addAlert("Leak detected in main line",'danger');
      break;
    case 'sensorFail':
      farmState.health.sensors='bad';
      addAlert("Soil sensor disconnected",'danger');
      break;
    case 'pumpFail':
      farmState.pump.failure=true;
      if(farmState.pump.on) { pumpStop(); }
      addAlert("Pump stopped: device error",'danger');
      break;
    case 'solarLoss':
      farmState.battery.solar=false;farmState.battery.charging=false;
      farmState.health.solar='bad';
      addAlert("Solar charging lost",'warn');
      break;
    default:
      // Reset simulation
      break;
  }
}

/* =============== LIVE SIMULATION ENGINE =============== */
function getTimeNow() {
  let d = new Date();
  return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0')+':'+d.getSeconds().toString().padStart(2,'0');
}
function randomWeather() {
  const conds=['Sunny',"Cloudy","Partly Cloudy","Rainy","Clear"];
  let c = Math.floor(Math.random()*5), r = Math.random()<0.13?Math.floor(Math.random()*87):Math.floor(Math.random()*30);
  let t = Math.floor(17+Math.random()*10), hum=Math.floor(53+Math.random()*35), w=Math.floor(8+Math.random()*11);
  let night = (new Date()).getHours()<7||(new Date()).getHours()>17;
  let fc = [];
  for(let i=0; i<6;i++){
    let c2 = conds[Math.floor(Math.random()*5)], t2=15+Math.floor(Math.random()*15), r2=Math.floor(Math.random()*55);
    fc.push({day:["Mon","Tue","Wed","Thu","Fri","Sat","Sun"][(new Date().getDay()+i)%7],icon:c2==="Sunny"?"☀️":c2==="Rainy"?"🌧️":c2==="Cloudy"?"☁️":"⛅",temp:t2,rain:r2});
  }
  return {condition:conds[c],rain:r,temp:t,humidity:hum,wind:w,forecast:fc,night};
}

setInterval(()=>{
  // LIVE SENSOR SIMULATION
  let s = farmState;
  if(s.simulation==='') {
    // Soil moisture - slow decay except when raining or irrigating
    if(s.pump.on) s.soil.moisture = Math.min(100,s.soil.moisture+Math.random()*3.1);
    else if(s.weather.rain>42) s.soil.moisture = Math.min(96,s.soil.moisture+Math.random()*1.3);
    else s.soil.moisture = Math.max(10,s.soil.moisture-0.3-Math.random()*0.22);

    // Tank slowly depletes but refills if solar is charging or reset
    if(s.valve.open && s.pump.on && s.tank.level>3 && s.simulation!=='tankEmpty')
      s.tank.level = Math.max(0,s.tank.level - (0.6+Math.random()*1.19));
    else if(s.tank.level<99 && s.battery.charging && s.solar)
      s.tank.level = Math.min(100,s.tank.level+0.32);

    // Flow rate
    if(s.simulation==='pipeLeak') s.flow=3.5+Math.random();
    else if(s.valve.open&&s.pump.on) s.flow = 1.9+Math.random();
    else s.flow = 0.6+Math.random()*0.9;

    // Temperature
    s.temp = Math.round(18+Math.sin(Date.now()/420000)*7+Math.random()*2);

    // Weather
    if(Math.random()<0.13 || !s.weather.forecast || !s.weather.forecast.length) {
      Object.assign(s.weather, randomWeather());
    }
    s.weather.temp = s.temp+Math.round(Math.random()*3-1);

    // Battery simulation
    if(s.battery.solar&&s.battery.charging) s.battery.level=Math.min(100,s.battery.level+0.18);
    else s.battery.level=Math.max(12,s.battery.level-0.13);
    s.battery.low = s.battery.level<20;

    // Internet: 1% chance of "offline" moment
    if(Math.random()<0.01) s.internet=false;
    else if(Math.random()<0.98) s.internet=true;

    // Health randomly goes 'ok'
    s.health.sensors = Math.random()<0.99 ? "good" : "ok";
    s.health.battery = s.battery.low ? "ok": "good";
    s.health.solar = s.battery.solar?"good":"bad";
    s.health.device = Math.random()<0.995?"good":"ok";
    s.health.uptime = Math.floor((Date.now()-s.bootTime)/1000);
  }

  // SMART IRRIGATION LOGIC
  let notify=false;
  // Auto-activate irrigation
  if(s.soil.moisture<s.soil.desired
    &&s.tank.level>14
    &&!s.pump.on
    &&!s.pump.failure
    &&s.settings.autoIrri
    &&s.weather.rain<30
    &&!s.demoEvents.rainstorm
    ) {
      pumpStart();
      s.history.push({event:"Irrigation auto-started",time:getTimeNow()});
      notify=true;
  } else if((s.soil.moisture>=s.soil.desired||s.weather.rain>80||s.tank.level<10||s.demoEvents.rainstorm)
    &&s.pump.on) {
      pumpStop();
      s.history.push({event:"Irrigation stopped by automation",time:getTimeNow()});
      notify=true;
  }
  // ALERTS
  if(s.tank.level<10) addAlert("Water tank low",'warn');
  if(s.flow>3.3) addAlert("Leak Warning",'warn');
  if(s.battery.low) addAlert("Battery low",'warn');
  if(!s.internet) addAlert("Sensor offline",'danger');
  // Re-render current screen for live updates
  if($('#app').style.display=='block') renderScreen(currentScreen);

}, 1500);

/* ====== INITIALIZE ====== */
setTheme(farmState.settings.darkMode);

</script>

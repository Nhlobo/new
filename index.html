<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Smart Irrigation</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#fff;
    overflow:hidden;
}

/* ================= APP ================= */

.app{
    width:100%;
    height:100dvh;
    position:relative;
    overflow:hidden;
}

/* ================= COMMON PAGE ================= */

.page{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    transition:1s ease;
}

/* ================= SPLASH SCREEN ================= */

.splash-screen{
    background:#F6F4D9;
    z-index:10;
    display:flex;
    flex-direction:column;
    justify-content:center;
    overflow:hidden;
}

.splash-content{
    width:100%;
    padding:0 34px;
    margin-top:-120px;
    z-index:2;
}

.title{
    font-size:clamp(2.5rem, 8vw, 4.3rem);
    font-weight:800;
    color:#20743D;
    line-height:1.05;
    letter-spacing:-2px;
}

.subtitle{
    margin-top:14px;
    font-size:clamp(0.95rem, 3vw, 1.2rem);
    color:#7B7B7B;
    line-height:1.5;
    max-width:330px;
}

.splash-image{
    position:absolute;
    bottom:0;
    left:0;
    width:100%;
    z-index:1;
}

.splash-image img{
    width:100%;
    display:block;
    object-fit:cover;
}

/* ================= LOGIN SCREEN ================= */

.login-screen{
    background:#FFFFFF;
    padding:45px 24px 0;
    opacity:0;
    visibility:hidden;
    overflow-y:auto;
}

.login-screen.active{
    opacity:1;
    visibility:visible;
}

.login-container{
    position:relative;
    z-index:2;
    max-width:500px;
    margin:auto;
    padding-bottom:260px;
}

.login-title{
    margin-top:35px;
    font-size:clamp(2rem, 7vw, 3.7rem);
    font-weight:800;
    color:#111329;
    letter-spacing:-2px;
    line-height:1.1;
}

.login-subtitle{
    margin-top:10px;
    color:#8A8A8A;
    font-size:clamp(0.95rem, 3vw, 1.1rem);
}

/* ================= FORM ================= */

.form-group{
    margin-top:34px;
}

.label{
    font-size:1.15rem;
    font-weight:700;
    color:#111329;
    margin-bottom:14px;
}

.input-box{
    width:100%;
    height:74px;
    border-radius:22px;
    border:2px solid #E8ECE8;
    background:#F8FAF8;
    display:flex;
    align-items:center;
    padding:0 20px;
    position:relative;
}

.input-box i{
    font-size:1.4rem;
    color:#7B7B7B;
}

.input-box input{
    width:100%;
    height:100%;
    border:none;
    outline:none;
    background:transparent;
    padding-left:16px;
    font-size:1rem;
    font-weight:500;
    color:#222;
}

.input-box input::placeholder{
    color:#8A8A8A;
    font-weight:400;
}

.eye{
    cursor:pointer;
    position:absolute;
    right:20px;
}

/* ================= BUTTON ================= */

.signin-btn{
    width:100%;
    height:72px;
    border:none;
    outline:none;
    border-radius:24px;
    background:#2B7A3E;
    color:white;
    font-size:1.2rem;
    font-weight:500;
    margin-top:55px;
    cursor:pointer;
    transition:0.2s;
    box-shadow:0 10px 25px rgba(43,122,62,0.2);
}

.signin-btn:active{
    transform:scale(0.98);
}

/* ================= LOGIN BG IMAGE ================= */

.login-bg{
    position:absolute;
    left:0;
    bottom:0;
    width:100%;
    z-index:1;
    pointer-events:none;
}

.login-bg img{
    width:100%;
    display:block;
    object-fit:cover;
}

/* ================= SMALL DEVICES ================= */

@media (max-width:480px){

    .login-screen{
        padding:35px 20px 0;
    }

    .input-box{
        height:68px;
        border-radius:20px;
    }

    .signin-btn{
        height:68px;
        border-radius:22px;
    }

    .login-container{
        padding-bottom:210px;
    }

}

/* ================= VERY SMALL DEVICES ================= */

@media (max-width:360px){

    .title{
        letter-spacing:-1px;
    }

    .login-title{
        letter-spacing:-1px;
    }

    .label{
        font-size:1rem;
    }

}

</style>
</head>

<body>

<div class="app">

    <!-- SPLASH SCREEN -->

    <section class="page splash-screen" id="splash">

        <div class="splash-content">

            <h1 class="title">
                Smart Irrigation
            </h1>

            <p class="subtitle">
                Real time status of all your Irrigation Device
            </p>

        </div>

        <div class="splash-image">
            <img src="greenhouse.png" alt="">
        </div>

    </section>

    <!-- LOGIN SCREEN -->

    <section class="page login-screen" id="login">

        <div class="login-container">

            <h1 class="login-title">
                Login Account
            </h1>

            <p class="login-subtitle">
                Please login with registered account
            </p>

            <!-- EMAIL -->

            <div class="form-group">

                <div class="label">
                    Email or Phone Number
                </div>

                <div class="input-box">

                    <i class="fa-regular fa-envelope"></i>

                    <input type="text"
                    placeholder="Enter your email">

                </div>

            </div>

            <!-- PASSWORD -->

            <div class="form-group">

                <div class="label">
                    Password
                </div>

                <div class="input-box">

                    <i class="fa-solid fa-lock"></i>

                    <input type="password"
                    id="password"
                    placeholder="Enter your password">

                    <i class="fa-regular fa-eye eye"
                    id="toggle"></i>

                </div>

            </div>

            <button class="signin-btn">
                Sign In
            </button>

        </div>

        <!-- BACKGROUND IMAGE -->

        <div class="login-bg">

            <img src="Firefly_Gemini Flash_An IoT agricultural device installed in a farm setting- soil moisture probes in the g 243046.png" alt="">

        </div>

    </section>

</div>

<script>

/* ================= SPLASH ANIMATION ================= */

const splash = document.getElementById("splash");
const login = document.getElementById("login");

setTimeout(() => {

    splash.style.opacity = "0";
    splash.style.pointerEvents = "none";

    login.classList.add("active");

}, 3000);

/* ================= PASSWORD TOGGLE ================= */

const toggle = document.getElementById("toggle");
const password = document.getElementById("password");

toggle.addEventListener("click", () => {

    if(password.type === "password"){

        password.type = "text";

        toggle.classList.remove("fa-eye");
        toggle.classList.add("fa-eye-slash");

    }else{

        password.type = "password";

        toggle.classList.remove("fa-eye-slash");
        toggle.classList.add("fa-eye");

    }

});

</script>

</body>
</html>

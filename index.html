<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login Account</title>
  <style>
    /* General page setup */
    body {
      margin: 0;
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #fdfdf0; /* light yellow background */
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* Container for login form */
    .login-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    /* Title and subtitle */
    .login-container h1 {
      font-size: 24px;
      margin-bottom: 5px;
      color: #333;
    }

    .login-container p {
      font-size: 14px;
      color: #666;
      margin-bottom: 20px;
    }

    /* Input fields */
    .input-field {
      width: 100%;
      max-width: 320px;
      margin-bottom: 15px;
      position: relative;
    }

    .input-field label {
      display: block;
      font-size: 13px;
      color: #444;
      margin-bottom: 5px;
    }

    .input-field input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
    }

    .input-field input:focus {
      border-color: #4caf50;
      outline: none;
    }

    /* Password eye icon */
    .input-field .toggle-password {
      position: absolute;
      right: 10px;
      top: 36px;
      cursor: pointer;
      font-size: 14px;
      color: #888;
    }

    /* Sign In button */
    button.sign-in {
      width: 100%;
      max-width: 320px;
      padding: 12px;
      background-color: #4caf50;
      border: none;
      border-radius: 6px;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    button.sign-in:hover {
      background-color: #43a047;
    }

    /* Decorative bottom illustration */
    .footer-illustration {
      width: 100%;
      height: 120px;
      background: url('nature-illustration.png') no-repeat center bottom;
      background-size: cover;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h1>Login Account</h1>
    <p>Please login with registered account.</p>

    <div class="input-field">
      <label>Email or Phone Number</label>
      <input type="text" placeholder="Enter your email">
    </div>

    <div class="input-field">
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter your password">
      <span class="toggle-password" onclick="togglePassword()">👁</span>
    </div>

    <button class="sign-in">Sign In</button>
  </div>

  <div class="footer-illustration"></div>

  <script>
    function togglePassword() {
      const passwordInput = document.getElementById('password');
      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
      } else {
        passwordInput.type = 'password';
      }
    }
  </script>
</body>
</html>

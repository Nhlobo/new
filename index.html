<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>WaterWise - Smart Irrigation System</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* ---- Theme Variables ---- */
    :root {
      --primary: #09fcb4;
      --primary-bright: #3cffef;
      --primary-dark: #00966e;
      --accent: #397bfe;
      --accent-bright: #1de3fc;
      --glass: rgba(36, 58, 96, 0.2);
      --glass-light: rgba(255,255,255,0.6);
      --glass-border: rgba(85,255,222,0.2);
      --text-primary: #e8f7ff;
      --text-secondary: #97aecd;
      --bg-gradient: linear-gradient(135deg, #111217 0%, #233048 100%);
      --card-gradient: linear-gradient(120deg, rgba(9,252,180,0.10) 0%, rgba(57,123,254,0.13) 100%);
      --shadow: 0 4px 24px 0 rgba(0,0,0,0.20), 0 1.5px 6px 0 rgba(9,252,180, 0.12);
      --shadow-hover: 0 8px 34px 0 rgba(0,0,0,0.27), 0 1.5px 10px 0 rgba(57,123,254, 0.14);
    }
    [data-theme="light"] {
      --primary: #07bc77;
      --accent: #4869e6;
      --glass: rgba(250,252,253,0.7);
      --glass-border: rgba(92,214,176,0.22);
      --text-primary: #181748;
      --text-secondary: #475379;
      --bg-gradient: linear-gradient(120deg, #e3f9fb 0%, #e4eafc 100%);
      --card-gradient: linear-gradient(120deg, #edfff5 0%, #d9eafe 100%);
      --shadow: 0 4px 15px #abcfc96c, 0 1.5px 6px 0 #4869e619;
      --shadow-hover: 0 10px 24px #abcfc980;
    }

    html, body {
      height: 100%;
      margin: 0;
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg-gradient);
      color: var(--text-primary);
      transition: background 0.6s cubic-bezier(.77,0,.18,1), color 0.4s;
    }
    body {
      min-height: 100vh;
      width: 100vw;
      overflow-x: hidden;
      overscroll-behavior-x: none;
      position: relative;
    }

    /* --- Splash Screen --- */
    #splash {
      position: fixed;
      z-index: 1000;
      inset: 0;
      background: linear-gradient(120deg, var(--primary), var(--accent));
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 0.5s;
      animation: fadeInSplash 1.2s;
    }
    .splash-logo {
      font-size: 2.8rem;
      font-weight: bold;
      letter-spacing: -2px;
      margin-bottom: .6rem;
      color: #fff;
      position: relative;
      animation: float 3s ease-in-out infinite;
      text-shadow: 0 0 15px #00ffe7, 0 0 6px #44fffd;
      user-select: none;
    }
    .splash-logo i {
      background: linear-gradient(90deg, var(--primary-bright) 0%, #fff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-right: .5rem;
    }
    .splash-slogan {
      font-size: 1.2rem;
      color: #f0ffee;
      opacity: 0.98;
      margin-bottom: 2.4rem;
      letter-spacing: .02em;
      text-shadow: 0 2px 12px #2229;
    }
    .splash-loader {
      width: 80px; height: 12px;
      background: rgba(255,255,255,0.12);
      border-radius: 6px;
      overflow: hidden;
      position: relative;
      box-shadow: 0 2px 12px #00f9c676;
      margin: 0 auto;
    }
    .splash-loader .bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--primary-bright) 0%, var(--accent-bright) 80%);
      border-radius: 6px;
      animation: loaderBar 1.7s 0.33s cubic-bezier(.77,0,.18,1) forwards;
    }
    @keyframes loaderBar { to { width: 100%; } }
    @keyframes float { 0%,100% { transform: translateY(0);} 50%{transform: translateY(-13px);} }
    @keyframes fadeInSplash { 0%{opacity:0;}100%{opacity:1;} }

    /* --- Onboarding --- */
    #onboarding {
      position: fixed;
      z-index: 100;
      inset: 0;
      background: var(--bg-gradient);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding-bottom: 8vh;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.5s;
    }
    #onboarding.active {
      pointer-events: auto;
      opacity: 1;
      animation: fadeIn .5s;
    }
    .onboarding-slide {
      width: 92vw; max-width: 410px;
      min-height: 320px;
      background: var(--glass);
      border: 1.5px solid var(--glass-border);
      border-radius: 22px;
      box-shadow: var(--shadow);
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 3.5rem 2rem 1rem 2rem;
      position: absolute;
      top: 12vh; left: 0; right: 0; margin: 0 auto;
      animation: fadeInUp 0.6s;
      text-align: center;
      backdrop-filter: blur(28px);
    }
    .onboarding-slide.active { display: flex; position: relative; z-index: 3; }
    .onboarding-slide h2 {
      font-size: 1.5rem; margin-bottom: 1.1rem;
      font-weight: 800;
      background: linear-gradient(90deg, var(--primary), var(--accent) 95%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -.02em;
    }
    .onboarding-slide .slide-icon {
      font-size: 3.3rem;
      margin-bottom: .7rem;
      margin-top: .15rem;
      color: var(--primary);
      text-shadow: 0 2px 32px var(--primary-bright);
    }
    .onboarding-slide p {
      color: var(--text-secondary);
      margin-bottom: 1.1rem;
      font-size: 1rem;
    }
    .onboarding-indicator {
      display: flex; justify-content: center; align-items: center; gap: 10px;
    }
    .indicator-dot {
      width: 11px; height: 11px;
      border-radius: 50%;
      background: var(--glass-border);
      box-shadow: 0 1.5px 7px #4ff4e561;
      transition: background .3s, transform .3s;
    }
    .indicator-dot.active {
      background: linear-gradient(90deg, var(--primary-bright), var(--accent-bright));
      box-shadow: 0 2px 15px var(--primary-bright);
      transform: scale(1.16);
    }
    .onboarding-nav {
      display: flex;
      width: 92vw; max-width: 410px;
      justify-content: space-between;
      align-items: center;
      margin-top: 2.2rem;
      user-select: none;
      z-index: 2;
    }
    .onboarding-btn {
      font-weight: 700;
      font-size: 1.05rem;
      border: none;
      padding: 0.7em 1.6em;
      border-radius: 14px;
      color: #fff;
      background: linear-gradient(90deg, var(--accent), var(--primary));
      box-shadow: 0 2px 6px #1cddd237;
      margin: 0 2px;
      cursor: pointer;
      transition: background .23s, transform .12s;
    }
    .onboarding-btn.secondary {
      background: var(--glass);
      color: var(--primary);
      border: 1px solid var(--glass-border);
      font-weight: 500;
    }
    .onboarding-btn:active { transform: scale(0.97);}
    @keyframes fadeIn {from{opacity:0}to{opacity:1}}
    @keyframes fadeInUp {
      from{opacity:0;transform:translateY(24px);}
      to{opacity:1;transform:translateY(0);}
    }

    /* --- Login Screen --- */
    #login {
      position: fixed;
      z-index: 50;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-gradient);
      transition: opacity .5s;
      opacity: 0; pointer-events: none;
      animation: fadeIn .6s;
    }
    #login.active { opacity: 1; pointer-events: auto;}
    .login-card {
      min-width: 320px; max-width: 370px;
      width: 90vw;
      background: var(--glass);
      box-shadow: var(--shadow);
      backdrop-filter: blur(25px) saturate(150%);
      border-radius: 24px;
      border: 1.5px solid var(--glass-border);
      padding: 3rem 2.4rem 2.2rem 2.4rem;
      position: relative;
      display: flex; flex-direction: column; align-items: center;
      overflow: hidden;
      margin: 1rem 0;
    }
    .login-card::before {
      content: "";
      position: absolute;
      inset: -50% -50% 0 -50%;
      z-index: -2;
      height: 200%;
      background: repeating-linear-gradient(-45deg, #44fff9aa, #6364ea16 160px,#00e8c388 240px);
      filter: blur(55px) brightness(1.15);
      opacity: 0.5;
      animation: animated-bg 16s infinite linear;
    }
    @keyframes animated-bg {
      0% {background-position:0 0;}
      100% {background-position:225px 422px;}
    }
    .login-title {
      font-size: 1.6rem;
      font-weight: 700;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 1.4rem;
      text-align: center;
    }
    .form-group {
      width: 100%; position: relative; margin-bottom: 1.2rem;
    }
    .form-group input {
      width: 100%; padding: .88em 1.05em .88em 2.3em;
      border-radius: 10px;
      border: none;
      background: rgba(255,255,255,0.13);
      color: var(--text-primary);
      font-size: 1.02rem;
      outline: none;
      border: 1.2px solid transparent;
      transition: border-color .25s;
      margin-bottom: 2px;
      font-weight: 500;
      box-shadow: 0 1.2px 2.4px #06fcf312;
      backdrop-filter: blur(7px);
    }
    .form-group input:focus {
      background: rgba(255,255,255,0.19); border-color: var(--primary);}
    .form-group i {
      position: absolute; left: 10px; top: 50%;
      transform: translateY(-50%);
      color: var(--accent);
      font-size: 1.1em;
      opacity: 0.78;
    }
    .login-options {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: .93em;
      color: var(--text-secondary);
      margin-bottom: .2rem;
    }
    .login-remember {
      display: flex; gap: 7px;
      align-items: center;
      user-select: none;
      letter-spacing: 0.01em;
    }
    .faceid-btn {
      background: var(--glass-light);
      border: none;
      outline: none;
      color: var(--primary);
      padding: .45em .95em;
      border-radius: 60px;
      font-size: 1.4em;
      margin-left: 7px;
      display: flex; align-items: center;
      box-shadow: 0 1px 4px #3cffef11;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: background .2s;
    }
    .faceid-btn.animated i {
      animation: faceidPulse 1s;
    }
    @keyframes faceidPulse {
      0% {color:var(--primary);}
      45% {color:var(--accent-bright); transform:scale(1.19);}
      60% {color:#fff; transform:scale(1.22);}
      100% {color:var(--primary);}
    }
    .login-action-btn {
      margin-top: 1.3rem;
      width: 100%;
      padding: .8em 0;
      border-radius: 13px;
      border: none;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      color: #fff;
      font-weight: bold;
      box-shadow: 0 4px 16px #44ffd411;
      font-size: 1.1em;
      transition: background .24s, filter .13s, transform .11s;
      cursor: pointer;
    }
    .login-action-btn:active { filter:brightness(1.12); transform:scale(.98);}
    .login-demo-creds {
      text-align: center; color: var(--text-secondary); font-size: .92em;
      margin-top: 1.7em;
      letter-spacing: .02em;
      user-select: all;
    }
    /* Animated farming icons BG (bottom) */
    .login-bg-icons {
      position: absolute;
      z-index: 0;
      left: 0; right: 0;
      bottom: -4vh;
      display: flex;
      justify-content: center;
      gap: 30px;
      pointer-events: none;
      opacity: .18;
      animation: fadeIn .8s;
    }
    .login-bg-icons i {
      font-size:3.3em; animation: farmMove 7s infinite cubic-bezier(.9,-0.1,.2,1.2) alternate;
    }
    .login-bg-icons i:nth-child(2) { animation-delay:1.2s; color:var(--accent); }
    .login-bg-icons i:nth-child(3) { animation-delay:0.7s; color:var(--primary-bright);}
    @keyframes farmMove {
      0%{transform:translateY(0);}
      100%{transform:translateY(-14px) scale(1.09);}
    }

    /* --- Main App Structure --- */
    .app-container {
      display: none;
      width: 100vw;
      min-height: 100vh;
      min-height: 100dvh;
      flex-direction: row;
    }
    .app-container.active {display: flex;}
    /* Sidebar */
    .sidebar {
      width: 71px;
      background: var(--glass);
      border-right: 1.5px solid var(--glass-border);
      transition: width .34s, box-shadow .25s;
      box-shadow: 2px 0 22px #1de3fc04;
      z-index: 3;
      position: relative;
      display: flex; flex-direction: column; align-items: center;
      padding-top: 20px;
    }
    .sidebar.expanded {width: 200px;}
    .sidebar .logo {
      color: var(--primary);
      font-size: 2.1em;
      font-weight: bold;
      display: flex; align-items: center;
      margin-bottom: 2.3em; gap: 0.2em;
      user-select: none;
      letter-spacing: -2px;
    }
    .sidebar.expanded .logo span {display: inline;}
    .sidebar .logo span {display: none;}
    .nav-links {
      flex: 1 1;
      width: 100%; padding: 0;
      display: flex; flex-direction: column; gap: 3px;
    }
    .nav-link {
      width: 100%;
      display: flex; align-items: center;
      padding: 14px 0 14px 0;
      justify-content: center;
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 1.18em;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: background .19s, color .19s, border-left .19s;
      border-radius: 14px 0 0 14px;
      gap: 13px;
      user-select: none;
    }
    .sidebar.expanded .nav-link{
      justify-content: flex-start;
      padding-left: 23px;
    }
    .nav-link.active, .nav-link:hover {
      background: var(--card-gradient);
      color: var(--primary);
      border-left: 3px solid var(--accent);
    }
    .nav-link span {
      opacity: 0;
      margin-left: 2px;
      font-size: 1.07em;
      transition: opacity .21s;
    }
    .sidebar.expanded .nav-link span {opacity:1;}

    .sidebar-toggle {
      width: 35px; height: 35px;
      display: flex; align-items: center; justify-content: center;
      background: var(--glass);
      position: absolute; top: 23px; right: -17px;
      border-radius: 14px;
      border: 1px solid var(--glass-border);
      color: var(--primary);
      font-size: 1.27em;
      box-shadow: 0 1.5px 7px #1de3fc18;
      cursor: pointer;
      z-index: 5;
    }

    /* --- Main Content --- */
    .main-content {
      flex: 1 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      background: none;
      overflow-x: hidden;
      padding-bottom: 75px;
    }

    /* Top Navigation */
    .topbar {
      display: flex;
      align-items: center;
      padding: 1.2em 2.2em 0.3em 2.2em;
      justify-content: space-between;
      background: none;
    }
    .topbar-left {display: flex; align-items: center; gap: 8px;}
    .topbar-title {
      font-size: 1.2em; font-weight: bold; color: var(--primary);
      letter-spacing: 0.02em;
      margin-right: 7px;
      user-select: none;
    }
    .topbar-icons {display: flex; align-items: center; gap: 1.5em;}
    .bell-ctr {
      position: relative;
      color: var(--accent);
      cursor: pointer;
      font-size: 1.2em;
      transition: color .2s;
    }
    .bell-badge {
      position: absolute;
      top: -7px; right: -8px;
      background: linear-gradient(90deg,var(--primary),var(--accent));
      color: #fff;font-size:9px;
      padding: 1px 6px;
      border-radius: 12px;
      font-weight:600;
      box-shadow: 0 1px 5px #69efe7a0;
      letter-spacing:.03em;
      pointer-events: none;
    }
    .live-clock {
      font-size: 1.05em;
      margin-left: 7px;
      color: var(--text-primary);
      background: var(--glass);
      padding: .4em 1em;
      border-radius: 12px;
      font-weight: 500;
      min-width: 79px;text-align:center;
      box-shadow: 0 0 0 2px #3cffef03;
    }
    .profile {
      margin-left: 1.7em;
      display: flex; align-items: center; gap: 8px;
      background: var(--glass);
      border-radius: 14px;
      padding: .2em .92em .25em .40em;
      box-shadow: 0 1px 6px #00e8c388;
      cursor: pointer;
      font-weight: 500;
      font-size: 1.04em;
      color: var(--text-primary);
    }
    .profile-img {
      width: 29px;height:29px;
      border-radius: 50%;
      object-fit:cover;
      margin-right:2px;
      box-shadow:0 0 0 2px var(--primary);
      border: 1px solid var(--glass-border);
    }

    /* Floating action button */
    .fab {
      position: fixed;
      z-index: 10;
      bottom: 30px; right: 27px;
      width: 60px; height: 60px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent) 60%, var(--primary) 120%);
      color: #fff; font-size: 2.05em;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 7px 28px var(--accent-bright), 0 2px 18px #09fcb444;
      cursor: pointer;
      border: none;
      transition: filter .2s, box-shadow .2s, background .17s;
      filter: brightness(0.94);
      animation: float 4s ease-in-out infinite;
      box-shadow: 0 6px 26px #69ecfc40;
    }
    .fab:active {filter:brightness(1.10);}
    .fab i {pointer-events: none;}

    /* Responsive Bottom nav */
    .bottom-nav {
      display: none;
    }
    /* ------ PAGE CONTENT ------ */
    .pages {
      flex: 1 1;
      width: 100%; min-height: 0;
      padding: 0 0.5em;
      margin-top: 1.1em;
      z-index: 2;
      position: relative;
    }
    .page {
      display: none;
      width: 100%;
      max-width: 1020px;
      margin: 0 auto;
      background: var(--card-gradient);
      border-radius: 22px;
      box-shadow: var(--shadow);
      min-height: 420px;
      padding: 2.2em 1.7em 2.2em 2em;
      position: relative;
      margin-bottom: 1.5em;
      animation: fadeInUp .68s;
      text-align: left;
      font-size: 1.14em;
      font-weight: 500;
      color: var(--text-primary);
    }
    .page.active {display: block;}
    .page-title {font-size:2rem;margin-bottom:.3em;font-weight:700;color:var(--primary);}
    /* -------------------------- */

    /* --- Responsive styling --- */
    @media (min-width: 900px) { .main-content {padding-left:0;} }
    @media (max-width: 800px) {
      .main-content {padding-left:0;}
    }
    @media (max-width: 700px) {
      .sidebar { display: none;}
      .main-content {padding-left:0;}
      .fab {right: 15px; bottom: 74px;}
    }
    @media (max-width:580px) {
      .topbar {padding: 0.8em 1em;}
      .login-card {max-width:98vw;padding:2.1em 1em 2em 1em;}
      .onboarding-slide {padding:2rem 1em;}
    }
    @media (max-width:650px) {
      .bottom-nav {
        display: flex;
        position: fixed;
        z-index: 20;
        bottom: 0; left: 0; width: 100vw;
        background: var(--glass);
        justify-content: space-around;
        border-top: 1.5px solid var(--glass-border);
        box-shadow: 0 -2px 16px #1de3fc0c;
        padding: 0.09em 0;
        height: 60px;
        align-items: stretch;
      }
      .bottom-link {
        flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
        font-size: 1.28em; color: var(--text-secondary); cursor: pointer;transition:.16s;
        border-radius:10px 10px 0 0;
        text-decoration: none;
        font-weight:500;
        gap:3px;
      }
      .bottom-link.active, .bottom-link:active { color: var(--primary); background: var(--glass); }
    }
    /* Dark/light mode switch button */
    .theme-switch {
      background: var(--glass);
      border: 1.5px solid var(--glass-border);
      padding: 0.43em 0.8em;
      border-radius: 15px;
      margin-left: 11px;
      color: var(--primary);
      font-size: 1.15em;
      cursor: pointer;
      transition:background .19s;
    }
    .theme-switch:active{background: var(--glass-light);}
  </style>
</head>
<body>
<!-- ================= Splash Screen =================== -->
<div id="splash">
  <div class="splash-logo">
    <i class="fas fa-droplet"></i> WaterWise
  </div>
  <div class="splash-slogan">Smart Farming. Smarter Water.</div>
  <div class="splash-loader"><div class="bar"></div></div>
</div>

<!-- ================ Onboarding Slides ================= -->
<div id="onboarding">
  <!-- Slides injected by JS -->
  <div class="onboarding-indicator" id="onboarding-indicator"></div>
  <div class="onboarding-nav" id="onboarding-nav">
    <button class="onboarding-btn secondary" id="onboard-skip">Skip</button>
    <button class="onboarding-btn" id="onboard-next">Next</button>
  </div>
</div>

<!-- ================ Login Screen ==================== -->
<div id="login">
  <form class="login-card" autocomplete="off" onsubmit="return false;">
    <div class="login-title">Sign in to WaterWise</div>
    <div class="form-group">
      <i class="fas fa-envelope"></i>
      <input type="email" required placeholder="Email" id="login-email" autocomplete="username" value="demo@waterwise.com">
    </div>
    <div class="form-group">
      <i class="fas fa-lock"></i>
      <input type="password" required placeholder="Password" id="login-pass" autocomplete="current-password" value="demo123">
    </div>
    <div class="login-options">
      <label class="login-remember">
        <input type="checkbox" id="remember-me" checked style="accent-color: var(--primary);"> Remember me
      </label>
      <button type="button" class="faceid-btn" id="faceid-btn" title="Face ID" aria-label="Face ID">
        <i class="fas fa-fingerprint"></i>
      </button>
    </div>
    <button class="login-action-btn" id="demo-login" style="margin-top:1.4em;">
      <i class="fas fa-sign-in-alt"></i> Enter Demo
    </button>
    <div class="login-demo-creds">demo@waterwise.com / demo123</div>
    <div class="login-bg-icons">
      <i class="fas fa-tractor"></i>
      <i class="fas fa-seedling"></i>
      <i class="fas fa-cloud-sun"></i>
    </div>
  </form>
</div>

<!-- ================= Main App UI ================= -->
<div class="app-container" id="app">
  <!-- Sidebar nav -->
  <nav class="sidebar expanded" id="sidebar">
    <div class="logo">
      <i class="fas fa-droplet"></i>
      <span>WaterWise</span>
    </div>
    <div class="nav-links" id="side-links"></div>
    <div class="sidebar-toggle" id="sidebar-toggle"><i class="fas fa-angle-double-left"></i></div>
  </nav>
  <!-- Main Content -->
  <div class="main-content">
    <div class="topbar">
      <div class="topbar-left">
        <span class="topbar-title" id="topbar-title">Dashboard</span>
      </div>
      <div class="topbar-icons">
        <span class="bell-ctr" title="Notifications">
          <i class="fas fa-bell"></i>
          <span class="bell-badge" id="bell-badge">3</span>
        </span>
        <span class="live-clock" id="clock"></span>
        <button class="theme-switch" id="theme-switch" title="Toggle dark/light mode"><i class="fas fa-moon"></i></button>
        <span class="profile"><img class="profile-img" src="https://randomuser.me/api/portraits/men/85.jpg" alt="Profile"> Alex</span>
      </div>
    </div>
    <div class="pages" id="pages">
      <!-- Page containers injected by JS -->
    </div>
  </div>
  <!-- Floating action button -->
  <button class="fab" id="fab"><i class="fas fa-plus"></i></button>
</div>

<!-- ============== Mobile Bottom Nav ============= -->
<div class="bottom-nav" id="bottom-nav">
  <!-- Nav links filled by JS -->
</div>

<script>
const pagesData = [
  {id:"dashboard",icon:"fa-tachometer-alt", name:"Dashboard"},
  {id:"irrigation", icon:"fa-tint", name:"Irrigation Control"},
  {id:"sensors", icon:"fa-microchip", name:"Sensors"},
  {id:"weather", icon:"fa-cloud-sun", name:"Weather"},
  {id:"analytics", icon:"fa-chart-line", name:"Analytics"},
  {id:"faults", icon:"fa-exclamation-triangle", name:"Fault Detection"},
  {id:"water-usage", icon:"fa-droplet", name:"Water Usage"},
  {id:"solar", icon:"fa-solar-panel", name:"Solar & Battery"},
  {id:"automation", icon:"fa-magic", name:"Automation Rules"},
  {id:"zones", icon:"fa-map", name:"Farm Zones"},
  {id:"notifications", icon:"fa-bell", name:"Notifications"},
  {id:"reports", icon:"fa-file-alt", name:"Reports"},
  {id:"settings", icon:"fa-cog", name:"Settings"},
  {id:"help", icon:"fa-question-circle", name:"Help"},
];

// ONBOARDING SLIDES DATA
const slides = [
  {title:"Smart Irrigation",icon:"fa-droplet",desc:"Automated, zone-based watering system that adapts in real time to soil and weather."},
  {title:"Solar Powered Farming",icon:"fa-solar-panel",desc:"100% solar powered operation with battery backup for seamless automation."},
  {title:"AI Water Monitoring",icon:"fa-brain",desc:"AI monitors trends, moisture & tank levels for precision and cost savings."},
  {title:"Leak Detection",icon:"fa-shield-alt",desc:"Advanced leak detection for instant alerts, auto shutoff to protect your crops."},
  {title:"Remote Farm Control",icon:"fa-mobile-alt",desc:"Monitor and adjust your irrigation from anywhere, anytime. Total control in your hand."},
];

// ========== Splash Auto-Transition ==========
setTimeout(() => {
  document.getElementById("splash").style.opacity=0;
  setTimeout(()=>{
    document.getElementById("splash").style.display="none";
    onboardingShow();
  },480);
}, 2200);

// ========== ONBOARDING ==========
function onboardingShow() {
  const onbd = document.getElementById("onboarding");
  onbd.style.display="flex";
  onbd.classList.add("active");
  setOnboardingSlide(0);
}
let obSlide = 0;
function setOnboardingSlide(idx) {
  const ctr = document.getElementById("onboarding");
  ctr.querySelectorAll(".onboarding-slide").forEach(e=>e.remove());
  // insert slide
  const slideData = slides[idx];
  const slide = document.createElement("div");
  slide.className = "onboarding-slide active";
  slide.innerHTML = `
    <div class="slide-icon"><i class="fas ${slideData.icon}"></i></div>
    <h2>${slideData.title}</h2>
    <p>${slideData.desc}</p>
  `;
  ctr.insertBefore(slide, ctr.querySelector(".onboarding-indicator"));
  // Update dots
  let dots = '';
  for(let i=0;i<slides.length;i++)
    dots+=`<span class="indicator-dot${i===idx?' active':''}"></span>`;
  document.getElementById("onboarding-indicator").innerHTML = dots;
  // Update buttons
  const nextBtn = document.getElementById("onboard-next");
  nextBtn.innerText = idx===slides.length-1 ? "Get Started" : "Next";
}

document.getElementById("onboard-next").onclick = ()=>{
  if(obSlide<slides.length-1){ obSlide++; setOnboardingSlide(obSlide);}
  else{ // Get Started
    document.getElementById("onboarding").classList.remove("active");
    setTimeout(()=>{document.getElementById("onboarding").style.display="none";loginShow();},340);
  }
}
document.getElementById("onboard-skip").onclick = ()=>{
  document.getElementById("onboarding").classList.remove("active");
  setTimeout(()=>{document.getElementById("onboarding").style.display="none";loginShow();},340);
}

// Allow left/right swipe (touch)
let obTouchX = null;
document.getElementById("onboarding").addEventListener("touchstart",e=>{
  obTouchX = e.touches[0].clientX;
})
document.getElementById("onboarding").addEventListener("touchend",e=>{
  if(obTouchX==null)return;
  let dx = e.changedTouches[0].clientX-obTouchX;
  if(Math.abs(dx)>44){
    if(dx>0 && obSlide>0) { obSlide--; setOnboardingSlide(obSlide);}
    if(dx<0 && obSlide<slides.length-1) { obSlide++; setOnboardingSlide(obSlide);}
  }
  obTouchX=null;
});

// ======== LOGIN SCREEN =========
function loginShow() {
  const log = document.getElementById("login");
  log.classList.add("active");
  setTimeout(()=>log.querySelector('input[type=email]').focus(),270);
}
function loginHide() {
  document.getElementById("login").classList.remove("active");
}
document.getElementById("demo-login").onclick = ()=>{
  loginHide();
  setTimeout(appShow,340);
}
// Biometric click
document.getElementById("faceid-btn").onclick = function(){
  this.classList.add('animated');
  setTimeout(()=>this.classList.remove('animated'),900);
};
// Enter on password field will submit
document.getElementById("login-pass").addEventListener("keydown",function(e){
  if(e.key==="Enter") document.getElementById("demo-login").click();
});

// ============ MAIN APP AND NAVIGATION ============
function appShow(){
  document.getElementById("app").classList.add("active");
  createNavs();
  createPages();
  setPage("dashboard");
}
// Sidebar nav links creation
function createNavs(){
  const side = document.getElementById("side-links");
  side.innerHTML = pagesData.map((p,i)=>
    `<a class="nav-link${i===0?' active':''}" data-page="${p.id}" title="${p.name}"><i class="fas ${p.icon}"></i><span>${p.name}</span></a>`
  ).join('');
  side.querySelectorAll(".nav-link").forEach(el=>{
    el.onclick = function(){
      side.querySelectorAll(".nav-link").forEach(t=>t.classList.remove('active'));
      this.classList.add("active");
      setPage(this.getAttribute("data-page"));
    }
  });
  // Mobile nav
  const bot = document.getElementById("bottom-nav");
  bot.innerHTML = pagesData.slice(0,5).map((p,i)=>
    `<a class="bottom-link${i===0?' active':''}" data-page="${p.id}" title="${p.name}"><i class="fas ${p.icon}"></i><span style="font-size:.7em">${p.name.split(" ")[0]}</span></a>`
  ).join('');
  bot.querySelectorAll('.bottom-link').forEach(el=>{
    el.onclick=function(){
      bot.querySelectorAll(".bottom-link").forEach(t=>t.classList.remove('active'));
      this.classList.add('active');
      setPage(this.getAttribute("data-page"));
      // sync sidebar (if open)
      document.querySelectorAll('.sidebar .nav-link').forEach(t=>{
        if(t.getAttribute("data-page")==this.getAttribute("data-page")) t.classList.add('active');
        else t.classList.remove('active');
      });
    }
  });
}
// Pages creation
function createPages(){
  const container = document.getElementById("pages");
  container.innerHTML = pagesData.map((p,i)=>
    `<section class="page${i===0?' active':''}" id="page-${p.id}">
      <div class="page-title">${p.name}</div>
      <div class="page-content"> <!-- Add your content here --> </div>
    </section>`
  ).join('');
}
function setPage(id){
  // Title
  document.getElementById("topbar-title").innerText = pagesData.find(p=>p.id==id).name;
  // Show page
  document.querySelectorAll(".page").forEach(p=>p.classList.remove('active'));
  let el = document.getElementById("page-"+id);
  if(el) el.classList.add("active");
}

// Sidebar expand/collapse
const sidebar = document.getElementById("sidebar");
document.getElementById("sidebar-toggle").onclick = function(){
  if(sidebar.classList.contains("expanded")){
    sidebar.classList.remove("expanded");
    this.querySelector("i").className = "fas fa-angle-double-right";
  } else {
    sidebar.classList.add("expanded");
    this.querySelector("i").className = "fas fa-angle-double-left";
  }
}

// FAB button demo
document.getElementById("fab").onclick = ()=>alert("Floating Action Button");

// =========== LIVE CLOCK ============
function updateClock(){
  const el = document.getElementById("clock");
  const d = new Date();
  el.innerText = d.toLocaleTimeString([], {hour:"2-digit",minute:"2-digit",second:"2-digit"});
}
setInterval(updateClock,1000); updateClock();

// =========== THEME SWITCHER ==========
const themeSwitch = document.getElementById("theme-switch");
themeSwitch.onclick = ()=>{
  const html = document.documentElement;
  const dark = html.getAttribute("data-theme")!=="dark";
  html.setAttribute("data-theme", dark?"dark":"light");
  localStorage.setItem("ww-theme",dark?"dark":"light");
  themeSwitch.innerHTML = `<i class="fas fa-${dark?"moon":"sun"}"></i>`;
};
// On load, apply theme from storage
window.addEventListener('DOMContentLoaded',()=>{
  let pref = localStorage.getItem("ww-theme");
  if(pref) document.documentElement.setAttribute("data-theme",pref);
  themeSwitch.innerHTML = `<i class="fas fa-${pref==="dark"?"moon":"sun"}"></i>`;
});
</script>
</body>
</html>

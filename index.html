<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Smart Irrigation</title>

<!-- GOOGLE FONT -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<!-- FONT AWESOME -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

html,
body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#ffffff;
}

/* ========================================= */
/* APP */
/* ========================================= */

.app{
    width:100%;
    height:100vh;
    position:relative;
    overflow:hidden;
}

/* ========================================= */
/* COMMON PAGE */
/* ========================================= */

.page{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    transition:1s ease;
}

/* ========================================= */
/* SPLASH SCREEN */
/* ========================================= */

.splash-screen{
    background:#F5F4D9;
    z-index:10;
    overflow:hidden;
}

/* SPLASH CONTENT */

.splash-content{
    position:absolute;
    top:14%;
    left:8%;
    z-index:3;
}

.splash-title{
    font-size:clamp(44px,7vw,84px);
    font-weight:800;
    color:#1E7B3F;
    line-height:1.05;
    letter-spacing:-2px;
}

.splash-subtitle{
    margin-top:12px;
    color:#7C7C7C;
    font-size:clamp(15px,1.5vw,21px);
    line-height:1.5;
    max-width:340px;
}

/* SPLASH IMAGE */

.splash-bg{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    background-image:url('greenhouse.png');
    background-size:cover;
    background-position:center bottom;
    background-repeat:no-repeat;
}

/* ========================================= */
/* LOGIN SCREEN */
/* ========================================= */

.login-screen{
    opacity:0;
    visibility:hidden;
    overflow:hidden;
    background:#ffffff;
}

.login-screen.active{
    opacity:1;
    visibility:visible;
}

/* BACKGROUND IMAGE */

.login-bg{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    background-image:url('Firefly_Gemini Flash_An IoT agricultural device installed in a farm setting- soil moisture probes in the g 243046.png');
    background-size:cover;
    background-position:center bottom;
    background-repeat:no-repeat;
}

/* GLASS OVERLAY */

.login-bg::before{
    content:"";
    position:absolute;
    inset:0;

    background:
    linear-gradient(
        to bottom,
        rgba(255,255,255,0.35),
        rgba(255,255,255,0.18),
        rgba(255,255,255,0.08)
    );

    backdrop-filter:blur(10px);
    -webkit-backdrop-filter:blur(10px);
}

/* ========================================= */
/* LOGIN CARD */
/* ========================================= */

.login-wrapper{
    width:100%;
    height:100%;
    display:flex;
    align-items:center;
    justify-content:flex-start;
    position:relative;
    z-index:5;
    padding:30px;
}

/* GLASS CARD */

.login-card{

    width:100%;
    max-width:520px;

    background:rgba(255,255,255,0.16);

    border:1px solid rgba(255,255,255,0.28);

    backdrop-filter:blur(16px);
    -webkit-backdrop-filter:blur(16px);

    border-radius:34px;

    padding:40px 32px;

    box-shadow:
    0 10px 40px rgba(0,0,0,0.12);
}

/* TITLES */

.login-title{
    font-size:clamp(42px,5vw,70px);
    font-weight:800;
    color:#101328;
    line-height:1.05;
    letter-spacing:-2px;
}

.login-subtitle{
    margin-top:12px;
    color:#646464;
    font-size:clamp(15px,1.4vw,20px);
}

/* ========================================= */
/* FORM */
/* ========================================= */

.form-group{
    margin-top:34px;
}

.label{
    font-size:20px;
    font-weight:700;
    color:#111329;
    margin-bottom:14px;
}

/* INPUT */

.input-box{
    width:100%;
    height:76px;

    background:rgba(255,255,255,0.42);

    border:1px solid rgba(255,255,255,0.4);

    border-radius:22px;

    display:flex;
    align-items:center;

    padding:0 22px;

    position:relative;
}

.input-box i{
    font-size:22px;
    color:#5F5F5F;
}

.input-box input{
    width:100%;
    height:100%;
    border:none;
    outline:none;
    background:transparent;
    padding-left:15px;
    font-size:17px;
    color:#222;
    font-weight:500;
}

.input-box input::placeholder{
    color:#6F6F6F;
    font-weight:400;
}

/* EYE */

.eye{
    position:absolute;
    right:22px;
    cursor:pointer;
}

/* ========================================= */
/* BUTTON */
/* ========================================= */

.signin-btn{
    width:100%;
    height:74px;

    border:none;
    outline:none;

    border-radius:24px;

    background:#2A7A3E;

    color:#ffffff;

    font-size:21px;
    font-weight:600;

    margin-top:52px;

    cursor:pointer;

    transition:0.25s;

    box-shadow:
    0 10px 25px rgba(42,122,62,0.25);
}

.signin-btn:hover{
    background:#236735;
}

.signin-btn:active{
    transform:scale(0.98);
}

/* ========================================= */
/* RESPONSIVE */
/* ========================================= */

@media(max-width:768px){

    .splash-content{
        top:12%;
        left:7%;
    }

    .splash-bg{
        background-size:contain;
        background-position:center bottom;
    }

    .login-bg{
        background-size:cover;
        background-position:center;
    }

    .login-wrapper{
        padding:18px;
        align-items:flex-start;
    }

    .login-card{
        margin-top:40px;
        padding:30px 22px;
        border-radius:28px;
    }

    .input-box{
        height:70px;
    }

    .signin-btn{
        height:70px;
        font-size:19px;
    }

    .label{
        font-size:18px;
    }

}

/* SMALL PHONES */

@media(max-width:480px){

    .login-title,
    .splash-title{
        letter-spacing:-1px;
    }

    .splash-bg{
        background-size:100% auto;
    }

    .login-bg{
        background-size:cover;
    }

}

</style>
</head>

<body>

<div class="app">

    <!-- ================================= -->
    <!-- SPLASH SCREEN -->
    <!-- ================================= -->

    <section class="page splash-screen" id="splash">

        <div class="splash-content">

            <h1 class="splash-title">
                Smart Irrigation
            </h1>

            <p class="splash-subtitle">
                Real time status of all your Irrigation Device
            </p>

        </div>

        <div class="splash-bg"></div>

    </section>

    <!-- ================================= -->
    <!-- LOGIN SCREEN -->
    <!-- ================================= -->

    <section class="page login-screen" id="login">

        <!-- BACKGROUND -->

        <div class="login-bg"></div>

        <!-- CONTENT -->

        <div class="login-wrapper">

            <div class="login-card">

                <h1 class="login-title">
                    Login Account
                </h1>

                <p class="login-subtitle">
                    Please login with registered account
                </p>

                <!-- EMAIL -->

                <div class="form-group">

                    <div class="label">
                        Email or Phone Number
                    </div>

                    <div class="input-box">

                        <i class="fa-regular fa-envelope"></i>

                        <input
                        type="text"
                        placeholder="Enter your email">

                    </div>

                </div>

                <!-- PASSWORD -->

                <div class="form-group">

                    <div class="label">
                        Password
                    </div>

                    <div class="input-box">

                        <i class="fa-solid fa-lock"></i>

                        <input
                        type="password"
                        id="password"
                        placeholder="Enter your password">

                        <i
                        class="fa-regular fa-eye eye"
                        id="toggle"></i>

                    </div>

                </div>

                <!-- BUTTON -->

                <button class="signin-btn">
                    Sign In
                </button>

            </div>

        </div>

    </section>

</div>

<script>

/* ========================================= */
/* SPLASH TRANSITION */
/* ========================================= */

const splash = document.getElementById("splash");
const login = document.getElementById("login");

setTimeout(() => {

    splash.style.opacity = "0";
    splash.style.pointerEvents = "none";

    login.classList.add("active");

}, 3000);

/* ========================================= */
/* PASSWORD TOGGLE */
/* ========================================= */

const toggle = document.getElementById("toggle");
const password = document.getElementById("password");

toggle.addEventListener("click", () => {

    if(password.type === "password"){

        password.type = "text";

        toggle.classList.replace(
            "fa-eye",
            "fa-eye-slash"
        );

    }else{

        password.type = "password";

        toggle.classList.replace(
            "fa-eye-slash",
            "fa-eye"
        );

    }

});

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Smart Irrigation</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

html,
body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#fff;
}

/* ================= APP ================= */

.app{
    width:100%;
    height:100vh;
    position:relative;
    overflow:hidden;
}

/* ================= COMMON PAGE ================= */

.page{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    overflow:hidden;
}

/* ================= SPLASH SCREEN ================= */

.splash-screen{
    background:#F5F4D9;
    z-index:10;
    transition:1s ease;
}

/* TEXT */

.splash-content{
    position:absolute;
    top:18%;
    left:8%;
    z-index:2;
}

.title{
    font-size:clamp(42px, 6vw, 78px);
    font-weight:800;
    color:#1F7A3D;
    line-height:1.05;
    letter-spacing:-2px;
}

.subtitle{
    margin-top:14px;
    font-size:clamp(15px, 1.5vw, 20px);
    color:#7A7A7A;
    line-height:1.5;
}

/* IMAGE */

.splash-image{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
}

.splash-image img{
    position:absolute;
    bottom:0;
    left:0;
    width:100%;
    height:auto;
    object-fit:contain;
}

/* ================= LOGIN SCREEN ================= */

.login-screen{
    background:#FFFFFF;
    opacity:0;
    visibility:hidden;
    transition:1s ease;
}

.login-screen.active{
    opacity:1;
    visibility:visible;
}

/* FORM AREA */

.login-container{
    position:relative;
    z-index:2;
    width:100%;
    max-width:550px;
    padding:50px 35px;
}

/* TITLE */

.login-title{
    margin-top:30px;
    font-size:clamp(42px, 5vw, 68px);
    font-weight:800;
    color:#111329;
    line-height:1.05;
    letter-spacing:-2px;
}

.login-subtitle{
    margin-top:14px;
    color:#8A8A8A;
    font-size:clamp(15px, 1.5vw, 20px);
}

/* FORM */

.form-group{
    margin-top:35px;
}

.label{
    font-size:22px;
    font-weight:700;
    color:#111329;
    margin-bottom:14px;
}

.input-box{
    width:100%;
    height:78px;
    border-radius:22px;
    border:2px solid #E8ECE8;
    background:#F8FAF8;
    display:flex;
    align-items:center;
    padding:0 20px;
    position:relative;
}

.input-box i{
    font-size:24px;
    color:#7A7A7A;
}

.input-box input{
    width:100%;
    height:100%;
    border:none;
    outline:none;
    background:transparent;
    padding-left:16px;
    font-size:18px;
    color:#222;
    font-weight:500;
}

.input-box input::placeholder{
    color:#8A8A8A;
}

.eye{
    position:absolute;
    right:20px;
    cursor:pointer;
}

/* BUTTON */

.signin-btn{
    width:100%;
    height:76px;
    border:none;
    border-radius:24px;
    background:#2B7A3E;
    color:#fff;
    font-size:22px;
    font-weight:500;
    margin-top:55px;
    cursor:pointer;
    box-shadow:0 10px 25px rgba(43,122,62,0.18);
}

.signin-btn:active{
    transform:scale(0.98);
}

/* ================= LOGIN IMAGE ================= */

.login-bg{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    z-index:1;
    pointer-events:none;
}

.login-bg img{
    position:absolute;
    bottom:0;
    left:0;
    width:100%;
    height:auto;
    object-fit:contain;
}

/* ================= MOBILE ================= */

@media(max-width:768px){

    .splash-content{
        top:16%;
        left:8%;
    }

    .login-container{
        padding:35px 24px;
    }

    .label{
        font-size:18px;
    }

    .input-box{
        height:72px;
    }

    .signin-btn{
        height:72px;
        font-size:20px;
    }

}

/* ================= SMALL PHONES ================= */

@media(max-width:420px){

    .title,
    .login-title{
        letter-spacing:-1px;
    }

    .splash-content{
        top:14%;
    }

    .login-container{
        padding:28px 20px;
    }

    .input-box{
        border-radius:20px;
    }

    .signin-btn{
        border-radius:20px;
    }

}

</style>
</head>

<body>

<div class="app">

    <!-- SPLASH -->

    <section class="page splash-screen" id="splash">

        <div class="splash-content">

            <h1 class="title">
                Smart Irrigation
            </h1>

            <p class="subtitle">
                Real time status of all your Irrigation Device
            </p>

        </div>

        <div class="splash-image">

            <img src="greenhouse.png" alt="">

        </div>

    </section>

    <!-- LOGIN -->

    <section class="page login-screen" id="login">

        <div class="login-container">

            <h1 class="login-title">
                Login Account
            </h1>

            <p class="login-subtitle">
                Please login with registered account
            </p>

            <!-- EMAIL -->

            <div class="form-group">

                <div class="label">
                    Email or Phone Number
                </div>

                <div class="input-box">

                    <i class="fa-regular fa-envelope"></i>

                    <input type="text"
                    placeholder="Enter your email">

                </div>

            </div>

            <!-- PASSWORD -->

            <div class="form-group">

                <div class="label">
                    Password
                </div>

                <div class="input-box">

                    <i class="fa-solid fa-lock"></i>

                    <input type="password"
                    id="password"
                    placeholder="Enter your password">

                    <i class="fa-regular fa-eye eye"
                    id="toggle"></i>

                </div>

            </div>

            <button class="signin-btn">
                Sign In
            </button>

        </div>

        <!-- BACKGROUND IMAGE -->

        <div class="login-bg">

            <img src="Firefly_Gemini Flash_An IoT agricultural device installed in a farm setting- soil moisture probes in the g 243046.png" alt="">

        </div>

    </section>

</div>

<script>

/* SPLASH TRANSITION */

const splash = document.getElementById("splash");
const login = document.getElementById("login");

setTimeout(() => {

    splash.style.opacity = "0";
    splash.style.pointerEvents = "none";

    login.classList.add("active");

}, 3000);

/* PASSWORD TOGGLE */

const toggle = document.getElementById("toggle");
const password = document.getElementById("password");

toggle.addEventListener("click", () => {

    if(password.type === "password"){

        password.type = "text";

        toggle.classList.replace("fa-eye", "fa-eye-slash");

    }else{

        password.type = "password";

        toggle.classList.replace("fa-eye-slash", "fa-eye");

    }

});

</script>

</body>
</html>
